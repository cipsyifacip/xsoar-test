  dockerimage: docker.io/demisto/python3:3.12.13.8927230
  runonce: false
  script: |-
    import requests
    import urllib3
    import traceback
    import csv
    import io
    from datetime import datetime

    urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

    # =========================================
    # CONSTANTS
    # =========================================

    PAGE_SIZE = 500
    DATE_FORMAT = "%Y-%m-%d %H:%M:%S"

    SEVERITY_MAP = {
        0:   "Unknown",
        0.5: "Informational",
        1:   "Low",
        2:   "Medium",
        3:   "High",
        4:   "Critical",
    }

    STATUS_MAP = {
        0: "Pending",
        1: "Active",
        2: "Done",
        3: "Archive",
    }


    # =========================================
    # HELPERS
    # =========================================

    def parse_dt(dt_str):
        return datetime.strptime(dt_str.strip(), DATE_FORMAT).isoformat() + "Z"


    def table_to_markdown(title, rows, headers):
        lines = [f"### {title}", ""]
        lines.append("| " + " | ".join(headers) + " |")
        lines.append("| " + " | ".join(["---"] * len(headers)) + " |")
        for row in rows:
            lines.append("| " + " | ".join(str(row.get(h, "")) for h in headers) + " |")
        return "\n".join(lines)


    def result_note(human_readable, context=None, raw=None):
        entry = {
            "Type": 1,
            "ContentsFormat": "json" if raw is not None else "text",
            "Contents": raw if raw is not None else human_readable,
            "HumanReadable": human_readable,
        }
        if context:
            entry["EntryContext"] = context
        demisto.results(entry)


    def result_error(msg):
        demisto.results({
            "Type": 4,
            "ContentsFormat": "text",
            "Contents": msg,
        })


    # =========================================
    # CLIENT
    # =========================================

    class Client:
        def __init__(self, base_url, api_key, verify_ssl, use_proxy):
            self.base_url = base_url.rstrip("/")
            self.headers = {
                "Authorization": api_key,
                "Accept": "application/json",
                "Content-Type": "application/json",
            }
            self.verify_ssl = verify_ssl
            self.proxies = None if use_proxy else {"http": "", "https": ""}

        def search_page(self, from_date, to_date, page, size=PAGE_SIZE):
            payload = {
                "filter": {
                    "fromDate": from_date,
                    "toDate":   to_date,
                    "page":     page,
                    "size":     size,
                    "fields": [
                        "id", "name", "type", "severity", "status", "owner",
                        "created", "modified", "closed",
                        "playbookId", "playbookName", "investigationId",
                    ],
                    "sort": [{"field": "created", "asc": True}],
                }
            }
            resp = requests.post(
                f"{self.base_url}/incidents/search",
                headers=self.headers,
                json=payload,
                verify=self.verify_ssl,
                proxies=self.proxies,
                timeout=120,
            )
            if resp.status_code != 200:
                raise Exception(f"HTTP {resp.status_code}: {resp.text[:500]}")
            return resp.json()

        def fetch_all(self, from_date, to_date):
            results = []
            page = 0
            while True:
                data  = self.search_page(from_date, to_date, page)
                batch = data.get("data") or []
                if not batch:
                    break
                results.extend(batch)
                page += 1
            return results


    def normalize(inc):
        sev = inc.get("severity", 0)
        sta = inc.get("status", 0)
        playbook = (
            inc.get("playbookName")
            or inc.get("playbook")
            or inc.get("playbookId")
            or ""
        )
        return {
            "ID":              inc.get("id", ""),
            "Name":            inc.get("name", ""),
            "Type":            inc.get("type", ""),
            "Severity":        SEVERITY_MAP.get(sev, str(sev)),
            "Status":          STATUS_MAP.get(sta, str(sta)),
            "Owner":           inc.get("owner", ""),
            "Playbook":        playbook,
            "PlaybookID":      inc.get("playbookId", ""),
            "InvestigationID": inc.get("investigationId", ""),
            "Created":         inc.get("created", ""),
            "Modified":        inc.get("modified", ""),
            "Closed":          inc.get("closed", ""),
        }


    def build_client():
        params   = demisto.params()
        base_url = params.get("url", "").rstrip("/")
        creds    = params.get("credentials") or {}
        api_key  = creds.get("password") or params.get("api_key", "")
        if not api_key:
            raise Exception("API Key is required.")
        verify_ssl = not params.get("insecure", False)
        use_proxy  = params.get("proxy", False)
        return Client(base_url, api_key, verify_ssl, use_proxy)


    # =========================================
    # COMMANDS
    # =========================================

    def cmd_test_module(client):
        today = datetime.utcnow().strftime("%Y-%m-%d")
        payload = {
            "filter": {
                "fromDate": today + "T00:00:00Z",
                "toDate":   today + "T23:59:59Z",
                "page": 0, "size": 1,
                "fields": ["id"],
            }
        }
        resp = requests.post(
            f"{client.base_url}/incidents/search",
            headers=client.headers,
            json=payload,
            verify=client.verify_ssl,
            proxies=client.proxies,
            timeout=30,
        )
        if resp.status_code == 200:
            demisto.results("ok")
        else:
            demisto.results(f"Error: HTTP {resp.status_code} — {resp.text[:300]}")


    def cmd_export_incidents(client, args):
        start_time = args.get("start_time", "").strip()
        end_time   = args.get("end_time",   "").strip()
        if not start_time or not end_time:
            raise Exception("Both 'start_time' and 'end_time' are required.")

        raw  = client.fetch_all(parse_dt(start_time), parse_dt(end_time))
        rows = [normalize(i) for i in raw]

        if not rows:
            result_note(f"No incidents found between {start_time} and {end_time}.")
            return []

        headers = ["ID", "Name", "Type", "Severity", "Status",
                   "Owner", "Playbook", "InvestigationID", "Created", "Closed"]

        md = table_to_markdown(
            f"XSOAR Incidents | {start_time} to {end_time} | {len(rows)} total",
            rows, headers,
        )
        result_note(md, context={"XSOARExport.Incident(val.ID==obj.ID)": rows}, raw=raw)
        return rows


    def cmd_export_to_csv(client, args):
        rows = cmd_export_incidents(client, args)
        if not rows:
            return

        start_time = args.get("start_time", "unknown").strip()
        end_time   = args.get("end_time",   "unknown").strip()

        # Build CSV in memory
        buf = io.StringIO()
        writer = csv.DictWriter(buf, fieldnames=list(rows[0].keys()))
        writer.writeheader()
        writer.writerows(rows)
        csv_text = buf.getvalue()

        # Filename for display
        start_tag = start_time.replace(" ", "-").replace(":", "")
        end_tag   = end_time.replace(" ", "-").replace(":", "")
        filename  = f"xsoar_incidents_{start_tag}_to_{end_tag}.csv"

        # Write to XSOAR investigation storage via the internal API
        inv_id = demisto.investigation().get("id", "")
        server_url = demisto.demistoUrls().get("server", "")

        upload_resp = requests.post(
            f"{server_url}/entry/upload/{inv_id}",
            headers={"Authorization": demisto.getLicenseID()},
            files={"file": (filename, csv_text.encode("utf-8"), "text/csv")},
            verify=False,
            timeout=60,
        )

        if upload_resp.status_code == 200:
            # Upload succeeded — XSOAR created the file entry itself
            demisto.results({
                "Type": 1,
                "ContentsFormat": "text",
                "Contents": f"CSV file **{filename}** ({len(rows)} rows) uploaded successfully.",
                "HumanReadable": f"CSV file **{filename}** ({len(rows)} rows) uploaded successfully.",
            })
        else:
            # Fallback: return CSV as plain-text note so data is never lost
            demisto.results({
                "Type": 1,
                "ContentsFormat": "text",
                "Contents": csv_text,
                "HumanReadable": (
                    f"### {filename}\n\n"
                    f"_(File upload failed — CSV content below. Copy and save as `{filename}`.)_\n\n"
                    f"```\n{csv_text[:50000]}\n```"
                    + ("\n\n_(truncated — full data in Contents field)_" if len(csv_text) > 50000 else "")
                ),
            })


    # =========================================
    # MAIN
    # =========================================

    def main():
        command = demisto.command()
        try:
            client = build_client()
            if command == "test-module":
                cmd_test_module(client)
            elif command == "xsoar-export-incidents":
                cmd_export_incidents(client, demisto.args())
            elif command == "xsoar-export-incidents-to-csv":
                cmd_export_to_csv(client, demisto.args())
            else:
                raise NotImplementedError(f"Command not implemented: {command}")
        except Exception as e:
            demisto.error(traceback.format_exc())
            result_error(f"XSOARIncidentExporter error on '{command}': {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
