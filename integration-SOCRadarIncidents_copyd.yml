description: Fetches SOCRadar incidents with desired parameters so that relevant actions
  over the incidents can be taken by using Cortex XSOAR.
detaileddescription: "### Partner Contributed Integration\n#### Integration Author:
  SOCRadar Cyber Intelligence Inc.\nSupport and maintenance for this integration are
  provided by the author. Please use the following contact details:\n- **Email**:
  [xsoar@socradar.io](mailto:xsoar@socradar.io)\n- **URL**: [www.socradar.io](www.socradar.io)\n***\n##
  SOCRadar Incidents\nUse the SOCRadar Incidents integration to fetch incidents from
  SOCRadar and take appropriate actions over those incidents.\n***\n### How to obtain
  an API key\n\nTo obtain your SOCRadar incident API key please navigate to **Company
  Settings** page in SOCRadar platform. Under the **API Options** tab retrieve your
  API key or regenerate a new one. \n\nAfter obtaining the SOCRadar incident API key
  insert it into **API Key** field.\n\n### How to configure\n- ***Company ID***: Every
  incident in SOCRadar associates with a company. Insert the SOCRadar company ID of
  the company that you want to obtain incidents.\n- ***Maximum number of incidents
  to fetch*** (Default is *20*): Insert the maximum number of incidents to fetch from
  SOCRadar in each fetching period. (Limited to max 50)\n- ***Resolution Status***
  (Default is *All*): Resolution status of incidents to fetch. (All, Resolved, Not
  Resolved)\n- ***FP Status*** (Default is *All*): False positive status of incidents
  to fetch. (All, FP, Not FP)\n- ***Incident Main Type***: Main type of incidents
  to fetch. All incident main types can be found under **Incident Summary & Options**
  tab in your company's settings page within SOCRadar platform. Leave it blank to
  fetch all main type of incidents.\n- ***Incident Sub Type***: Sub type of incidents
  to fetch. All incident sub types can be found under **Incident Summary & Options**
  tab in your company's settings page within SOCRadar platform. Leave it blank to
  fetch all sub type of incidents.\n\n### Rate Limits\n\nTo prevent abuse and ensure
  service stability, all API requests are rate limited. Rate limits specify the maximum
  number of API calls that can be made in a minute period. The exact number of calls
  that your application can make per minute varies based on company plan. \n\nPlease
  bear in mind that you should be careful about the your API key's rate limit especially
  when you plan to have multiple instances of SOCRadar incident integration with the
  same API key. If the instances will require more access to the SOCRadar incident
  API than your API key's rate limit then this integration will not work properly
  due to rate limit exceeding.\n\n### Further Information\n\nFor further information
  about the usage and rate limitation of SOCRadar incident API please see [SOCRadar
  Incident API](https://platform.socradar.com/docs/api/incident_api/) documentation.\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/soc-radar-incidents)"
