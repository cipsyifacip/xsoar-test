script: |-
  def main():
      # Fetch the argument
      args = demisto.args()
      url = args.get("value")
      list_name = args.get("ListName")

      if not url:
          return_error("No URL provided to check.")

      res = demisto.executeCommand("getList", {"listName": list_name})

      if is_error(res):
          return_error(f"Could not find list 'list_to_check': {get_error(res)}")



  if __name__ == "__builtin__" or __name__ == "builtins":
      main()
