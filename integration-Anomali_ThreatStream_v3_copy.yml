        for file-id are: CSV, HTML, IOC, JSON, PDF, TXT.'
      name: import_value
      required: true
    - description: Indicator type to assign if a specific type is not associated with
        an observable. This is a global setting that applies to any imported IP-type
        observable when an explicit itype is not specified for it.
      name: ip_mapping
    - description: Indicator type to assign if a specific type is not associated with
        an observable. This is a global setting that applies to any imported domain-type
        observable when an explicit itype is not specified for it.
      name: domain_mapping
    - description: Indicator type to assign if a specific type is not associated with
        an observable. This is a global setting that applies to any imported URL-type
        observable when an explicit itype is not specified for it.
      name: url_mapping
    - description: Indicator type to assign if a specific type is not associated with
        an observable. This is a global setting that applies to any imported email-type
        observable when an explicit itype is not specified for it.
      name: email_mapping
    - description: Indicator type to assign if a specific type is not associated with
        an observable. This is a global setting that applies to any imported MD5-type
        observable when an explicit itype is not specified for it.
      name: md5_mapping
    - description: A comma-separated list of tags applied to the imported observables.
        For example, tag1,tag2.
      name: tags
    - auto: PREDEFINED
      description: You can add tags that are private to your organization by setting
        the tlp attribute for the tag to red. If you do not specify a tlp setting,
        the tag is visible to any ThreatStream user with access to the observable.
      name: tags_tlp
      predefined:
      - Red
      - Amber
      - Green
      - White
    - description: The timestamp when intelligence will expire on ThreatStream, in
        ISO format. For example, 2020-12-24T00:00:00. By default, the expiration_ts
        is set to 90 days from the current date.
      name: expiration_ts
    - auto: PREDEFINED
      defaultValue: inactive
      description: Whether the import job must be approved from the ThreatStream user
        interface before observables become active. When default_state is set to active,
        observables become active upon submission, without requiring approval. In
        these cases, an import job is created on ThreatStream which is automatically
        approved.
      name: default_state
      predefined:
      - active
      - inactive
    description: 'Imports indicators (observables) into ThreatStream. The imported
      data must be approved using the ThreatStream UI. The data can be imported using
