    register_module_line('Anomali ThreatStream v3', 'start', __line__())
    CONSTANT_PACK_VERSION = '2.2.34'
    demisto.debug('pack id = Anomali_ThreatStream, pack version = 2.2.34')
    import traceback
    from datetime import date


    import emoji
    import urllib3


    # Disable insecure warnings
    urllib3.disable_warnings()

    """ GLOBALS/PARAMS """
    DEFAULT_LIMIT_PAGE_SIZE = 50
    REPUTATION_COMMANDS = ["ip", "domain", "file", "url", "threatstream-email-reputation"]

    MODEL_TYPE_LIST = [
        "actor",
        "attackpattern",
        "campaign",
        "courseofaction",
        "incident",
        "identity",
        "infrastructure",
        "intrusionset",
        "malware",
        "signature",
        "tipreport",
        "ttp",
        "tool",
        "vulnerability",
    ]
    PUBLICATION_STATUS_LIST = ["new", "pending_review", "review_requested", "reviewed", "published"]
    SIGNATURE_TYPE_LIST = [
        "Bro",
        "Carbon Black Query",
        "ClamAV",
        "Custom",
        "CybOX",
        "OpenIOC",
        "RSA NetWitness",
        "Snort",
        "Splunk Query",
        "Suricata",
        "YARA",
    ]

    THREAT_STREAM = "ThreatStream"
    NO_INDICATORS_FOUND_MSG = "No intelligence has been found for {searchable_value}"
    DEFAULT_MALICIOUS_THRESHOLD = 65
    DEFAULT_SUSPICIOUS_THRESHOLD = 25
    HEADERS = {"Content-Type": "application/json"}
    RETRY_COUNT = 2

    IOC_ARGS_TO_INDICATOR_KEY_MAP = {
        "domain": {
            "domain": "value",
            "dns": "ip",
            "organization": "org",
            "traffic_light_protocol": "tlp",
            "geo_country": "country",
            "creation_date": "created_ts",
            "updated_date": "modified_ts",
            "registrant_name": "meta.registrant_name",
            "registrant_email": "meta.registrant_email",
            "registrant_phone": "meta.registrant_phone",
        },
        "url": {"url": "value", "asn": "asn", "organization": "org", "geo_country": "country", "traffic_light_protocol": "tlp"},
        "ip": {
            "ip": "value",
            "asn": "asn",
            "geo_latitude": "latitude",
            "geo_longitude": "longitude",
            "geo_country": "country",
            "traffic_light_protocol": "tlp",
        },
        "file": {"organization": "org", "traffic_light_protocol": "tlp"},
    }

    DEFAULT_INDICATOR_MAPPING = {
        "asn": "ASN",
        "value": "Address",
