script:
  commands:
  - arguments:
    - default: true
      description: The IP to check.
      isArray: true
      name: ip
      required: true
    - description: If confidence is greater than the threshold the IP address is considered
        malicious, otherwise it is considered good. This argument overrides the default
        IP threshold defined as a parameter.
      name: threshold
    - auto: PREDEFINED
      description: Whether to include results with an inactive status.
      name: include_inactive
      predefined:
      - "True"
      - "False"
    - auto: PREDEFINED
      defaultValue: "False"
      description: 'Enhance generic reputation commands to include additional information
        such as Threat Bulletins, Attach patterns, Actors, Campaigns, TTPs, vulnerabilities,
        etc. Note: If set to true, additional 6 API calls will be performed.'
      name: threat_model_association
      predefined:
      - "True"
      - "False"
    description: Checks the reputation of the given IP address.
    name: ip
    outputs:
    - contextPath: DBotScore.Indicator
      description: The indicator that was tested.
      type: String
    - contextPath: DBotScore.Type
      description: The indicator type.
      type: String
    - contextPath: DBotScore.Vendor
      description: The vendor used to calculate the score.
      type: String
    - contextPath: DBotScore.Score
      description: The actual score.
      type: Number
    - contextPath: IP.ASN
      description: The Autonomous System (AS) number associated with the indicator.
      type: String
    - contextPath: IP.Address
      description: The IP address of the indicator.
      type: String
    - contextPath: IP.Geo.Country
      description: The country associated with the indicator.
      type: String
