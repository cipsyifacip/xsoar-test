  - arguments:
    - description: The name of the rule.
      name: rule_name
      required: true
    - description: 'A comma-separated list of keywords for which you want the rule
        to match. Keywords added to rules must adhere to the following requirements:
        IP addresses must be expressed as regular expressions. IP subnets should be
        expressed using CIDR notation and not as regular expressions. Do not start
        or end keywords with *. Keywords must contain at least three characters.'
      isArray: true
      name: keywords
      required: true
    - description: 'A comma-separated list of fields you want the rule to match to
        their keywords. Possible values: observables, sandbox reports, threat bulletins,
        signatures, vulnerabilities.'
      isArray: true
      name: match_include
      required: true
    - description: A comma-separated list of IDs of the actors with which you want
        to associate matched entities. Use the threatstream-get-model-list command
        to get the actor IDs.
      isArray: true
      name: actor_ids
    - description: A comma-separated list of IDs of the campaigns with which you want
        to associate matched entities. Use the threatstream-get-model-list command
        to get the campaign IDs.
      isArray: true
      name: campaign_ids
    - auto: PREDEFINED
      description: The action you want to perform related to the investigation. Default
        is 'No Action'.
      name: investigation_action
      predefined:
      - Create New
      - Add To Existing
      - No Action
    - description: The investigation name. Required when 'Create New' is selected
        in the investigation_action argument.
      name: new_investigation_name
    - description: Existing investigation ID. Required when 'Add To Existing' is selected
        in the investigation_action argument. Use the threatstream-list-investigation
        command to get the investigation ID.
      name: existing_investigation_id
    - description: 'A comma-separated list of indicator types you want to exclude
        from rule matches. Example: actor_ipv6.'
      isArray: true
      name: exclude_indicator
    - description: 'A comma-separated list of indicator types you want to include
        from rule matches. Example: actor_ipv6.'
      isArray: true
      name: include_indicator
    - auto: PREDEFINED
      description: Whether you want to exclude the rule from matching observables
        that are included in your organization whitelist.
      name: exclude_notify_org_whitelisted
      predefined:
      - "True"
      - "False"
    - auto: PREDEFINED
      description: Whether you want to exclude keyword matches on observables imported
        by your organization from a keyword match or hourly digest email notifications.
      name: exclude_notify_owner_org
      predefined:
      - "True"
      - "False"
    - description: A comma-separated list of IDs of the incidents with which you want
        to associate matched entities. Use the threatstream-get-model-list command
        to get the incident IDs.
      isArray: true
      name: incident_ids
    - description: A comma-separated list of IDs of the malwares with which you want
        to associate matched entities. Use the threatstream-get-model-list command
        to get the malware IDs.
      isArray: true
      name: malware_ids
    - description: A comma-separated list of IDs of the signatures with which you
        want to associate matched entities. Use the threatstream-get-model-list command
        to get the signature IDs.
      isArray: true
      name: signature_ids
    - description: A comma-separated list of IDs of the threat bulletin with which
        you want to associate matched entities. Use the threatstream-get-model-list
        command to get the threat bulletin IDs.
      isArray: true
      name: threat_bulletin_ids
    - description: A comma-separated list of IDs of the TTPs with which you want to
        associate matched entities. Use the threatstream-get-model-list command to
        get the TTPs IDs.
      isArray: true
      name: ttp_ids
    - description: A comma-separated list of IDs of the vulnerabilities with which
        you want to associate matched entities. Use the threatstream-get-model-list
        command to get the vulnerabilities IDs.
      isArray: true
      name: vulnerability_ids
    - description: A comma-separated list of IDs of the tags with which you want to
        associate matched entities.
      isArray: true
      name: tags
