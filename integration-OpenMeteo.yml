  dockerimage: docker.io/demisto/python3:3.12.13.8927230
  runonce: false
  script: |-
    import urllib3
    from datetime import datetime, timezone

    # Disable insecure warnings
    urllib3.disable_warnings()

    """ CONSTANTS """

    INTEGRATION_NAME = "OpenMeteo"
    BASE_URL = "https://api.open-meteo.com/v1"
    GEOCODING_URL = "https://geocoding-api.open-meteo.com/v1"

    # Default region: Jakarta, Indonesia
    DEFAULT_LATITUDE = -6.2088
    DEFAULT_LONGITUDE = 106.8456
    DEFAULT_LOCATION_NAME = "Jakarta, Indonesia"
    DEFAULT_TIMEZONE = "Asia/Jakarta"

    HOURLY_VARIABLES = [
        "temperature_2m",
        "relative_humidity_2m",
        "precipitation",
        "wind_speed_10m",
        "wind_direction_10m",
        "surface_pressure",
        "cloud_cover",
        "visibility",
        "weather_code",
    ]

    CURRENT_VARIABLES = [
        "temperature_2m",
        "relative_humidity_2m",
        "apparent_temperature",
        "precipitation",
        "wind_speed_10m",
        "wind_direction_10m",
        "surface_pressure",
        "cloud_cover",
        "visibility",
        "weather_code",
        "is_day",
    ]

    WMO_WEATHER_CODES = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Depositing rime fog",
        51: "Drizzle: Light",
        53: "Drizzle: Moderate",
        55: "Drizzle: Dense",
        61: "Rain: Slight",
        63: "Rain: Moderate",
        65: "Rain: Heavy",
        71: "Snow: Slight",
        73: "Snow: Moderate",
        75: "Snow: Heavy",
        77: "Snow grains",
        80: "Rain showers: Slight",
        81: "Rain showers: Moderate",
        82: "Rain showers: Violent",
        85: "Snow showers: Slight",
        86: "Snow showers: Heavy",
        95: "Thunderstorm: Slight/Moderate",
        96: "Thunderstorm with slight hail",
        99: "Thunderstorm with heavy hail",
    }

    """ CLIENT CLASS """


    class Client(BaseClient):
        """Client class for Open-Meteo API."""

        def __init__(self, base_url: str, verify: bool, proxy: bool):
            super().__init__(base_url=base_url, verify=verify, proxy=proxy)

        def get_current_weather(
            self,
            latitude: float,
            longitude: float,
            timezone: str = "auto",
        ) -> dict:
            """Fetch current weather conditions."""
            params = {
                "latitude": latitude,
                "longitude": longitude,
                "current": ",".join(CURRENT_VARIABLES),
                "timezone": timezone,
            }
            return self._http_request(method="GET", url_suffix="/forecast", params=params)

        def get_hourly_forecast(
            self,
            latitude: float,
            longitude: float,
            forecast_days: int = 7,
            timezone: str = "auto",
            start_date: Optional[str] = None,
            end_date: Optional[str] = None,
        ) -> dict:
            """Fetch hourly weather forecast."""
            params: dict = {
                "latitude": latitude,
                "longitude": longitude,
                "hourly": ",".join(HOURLY_VARIABLES),
                "timezone": timezone,
                "forecast_days": forecast_days,
            }
            if start_date:
                params["start_date"] = start_date
            if end_date:
                params["end_date"] = end_date
            return self._http_request(method="GET", url_suffix="/forecast", params=params)

        def get_historical_weather(
            self,
            latitude: float,
            longitude: float,
            start_date: str,
            end_date: str,
            timezone: str = "auto",
        ) -> dict:
            """Fetch historical weather data."""
            params = {
                "latitude": latitude,
                "longitude": longitude,
                "hourly": ",".join(HOURLY_VARIABLES),
                "timezone": timezone,
                "start_date": start_date,
                "end_date": end_date,
            }
            # Historical endpoint
            return self._http_request(
                method="GET",
                full_url="https://archive-api.open-meteo.com/v1/archive",
                params=params,
            )

        def geocode_location(self, location_name: str, count: int = 5) -> dict:
            """Resolve a location name to geographic coordinates."""
            params = {
                "name": location_name,
                "count": count,
                "language": "en",
                "format": "json",
            }
            return self._http_request(
                method="GET",
                full_url=f"{GEOCODING_URL}/search",
                params=params,
            )


    """ HELPER FUNCTIONS """


    def resolve_coordinates(
        client: Client,
        latitude: Optional[str],
        longitude: Optional[str],
        location: Optional[str],
    ) -> tuple[float, float, str]:
        """
        Resolve latitude/longitude from explicit coords or location name.
        Returns (lat, lon, location_label).
        """
        if latitude and longitude:
            return float(latitude), float(longitude), f"{latitude},{longitude}"

        if location:
            result = client.geocode_location(location)
            results = result.get("results", [])
            if not results:
                raise DemistoException(f"Could not geocode location: '{location}'")
            best = results[0]
            label = f"{best.get('name', location)}, {best.get('country', '')}"
            return float(best["latitude"]), float(best["longitude"]), label

        # Fall back to defaults
        return DEFAULT_LATITUDE, DEFAULT_LONGITUDE, DEFAULT_LOCATION_NAME


    def wmo_description(code: Optional[int]) -> str:
        """Return human-readable WMO weather description."""
        if code is None:
            return "Unknown"
        return WMO_WEATHER_CODES.get(int(code), f"WMO Code {code}")


    def extract_hourly_for_time(hourly: dict, target_time: Optional[str]) -> Optional[dict]:
        """
        Given the hourly block and an ISO datetime string, find the matching hour row.
        Falls back to the first entry if target_time is None.
        """
        times = hourly.get("time", [])
        if not times:
            return None

        if target_time:
            # Normalize: accept "YYYY-MM-DDTHH:MM" or "YYYY-MM-DD HH:MM"
            target_norm = target_time.replace(" ", "T")[:16]
            for i, t in enumerate(times):
                if t[:16] == target_norm:
                    return {k: v[i] for k, v in hourly.items() if isinstance(v, list) and i < len(v)}
        # Return first entry
        return {k: v[0] for k, v in hourly.items() if isinstance(v, list) and v}


    """ COMMAND FUNCTIONS """


    def test_module(client: Client) -> str:
        """Test connectivity to Open-Meteo by fetching Jakarta weather."""
        client.get_current_weather(DEFAULT_LATITUDE, DEFAULT_LONGITUDE, DEFAULT_TIMEZONE)
        return "ok"


    def get_current_weather_command(client: Client, args: dict) -> CommandResults:
        """
        open-meteo-get-current-weather
        Returns current weather conditions for a given location.
        """
        latitude = args.get("latitude")
        longitude = args.get("longitude")
        location = args.get("location")
        timezone = args.get("timezone", "auto")

        lat, lon, label = resolve_coordinates(client, latitude, longitude, location)

        raw = client.get_current_weather(lat, lon, timezone)
        current = raw.get("current", {})
        units = raw.get("current_units", {})

        weather_code = current.get("weather_code")
        output = {
            "Location": label,
            "Latitude": lat,
            "Longitude": lon,
            "Timezone": raw.get("timezone", timezone),
            "Time": current.get("time"),
            "Temperature": current.get("temperature_2m"),
            "TemperatureUnit": units.get("temperature_2m", "°C"),
            "ApparentTemperature": current.get("apparent_temperature"),
            "RelativeHumidity": current.get("relative_humidity_2m"),
            "Precipitation": current.get("precipitation"),
            "WindSpeed": current.get("wind_speed_10m"),
            "WindDirection": current.get("wind_direction_10m"),
            "SurfacePressure": current.get("surface_pressure"),
            "CloudCover": current.get("cloud_cover"),
            "Visibility": current.get("visibility"),
            "WeatherCode": weather_code,
            "WeatherDescription": wmo_description(weather_code),
            "IsDay": bool(current.get("is_day")),
        }

        readable = tableToMarkdown(
            f"Current Weather — {label}",
            {
                "Time": output["Time"],
                "Temperature": f"{output['Temperature']} {output['TemperatureUnit']}",
                "Feels Like": f"{output['ApparentTemperature']} {output['TemperatureUnit']}",
                "Humidity": f"{output['RelativeHumidity']} %",
                "Precipitation": f"{output['Precipitation']} mm",
                "Wind Speed": f"{output['WindSpeed']} km/h",
                "Wind Direction": f"{output['WindDirection']}°",
                "Cloud Cover": f"{output['CloudCover']} %",
                "Visibility": f"{output['Visibility']} m",
                "Conditions": output["WeatherDescription"],
                "Day/Night": "Day" if output["IsDay"] else "Night",
            },
            headers=["Time", "Temperature", "Feels Like", "Humidity", "Precipitation",
                     "Wind Speed", "Wind Direction", "Cloud Cover", "Visibility",
                     "Conditions", "Day/Night"],
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="OpenMeteo.CurrentWeather",
            outputs_key_field="Time",
            outputs=output,
            readable_output=readable,
            raw_response=raw,
        )


    def get_hourly_forecast_command(client: Client, args: dict) -> CommandResults:
        """
        open-meteo-get-hourly-forecast
        Returns hourly forecast for 1-16 days ahead.
        """
        latitude = args.get("latitude")
        longitude = args.get("longitude")
        location = args.get("location")
        forecast_days = arg_to_number(args.get("forecast_days", "7")) or 7
        timezone = args.get("timezone", "auto")
        target_time = args.get("time")

        if forecast_days < 1 or forecast_days > 16:
            raise DemistoException("forecast_days must be between 1 and 16.")

        lat, lon, label = resolve_coordinates(client, latitude, longitude, location)

        raw = client.get_hourly_forecast(lat, lon, forecast_days, timezone)
        hourly = raw.get("hourly", {})
        units = raw.get("hourly_units", {})

        times = hourly.get("time", [])
        rows = []
        for i, t in enumerate(times):
            wc = hourly.get("weather_code", [None] * len(times))[i]
            rows.append({
                "Time": t,
                "Temperature": hourly.get("temperature_2m", [None] * len(times))[i],
                "RelativeHumidity": hourly.get("relative_humidity_2m", [None] * len(times))[i],
                "Precipitation": hourly.get("precipitation", [None] * len(times))[i],
                "WindSpeed": hourly.get("wind_speed_10m", [None] * len(times))[i],
                "WindDirection": hourly.get("wind_direction_10m", [None] * len(times))[i],
                "CloudCover": hourly.get("cloud_cover", [None] * len(times))[i],
                "WeatherCode": wc,
                "WeatherDescription": wmo_description(wc),
            })

        output = {
            "Location": label,
            "Latitude": lat,
            "Longitude": lon,
            "Timezone": raw.get("timezone", timezone),
            "ForecastDays": forecast_days,
            "Units": units,
            "Hourly": rows,
        }

        # If a specific time requested, highlight it
        highlight = None
        if target_time or not target_time:
            # Show first 24 hours in readable table (or row matching target_time)
            display_rows = rows
            if target_time:
                target_norm = target_time.replace(" ", "T")[:16]
                display_rows = [r for r in rows if r["Time"][:16] == target_norm] or rows[:1]
            else:
                display_rows = rows[:24]

        readable = tableToMarkdown(
            f"Hourly Forecast — {label} ({forecast_days} day{'s' if forecast_days > 1 else ''})",
            display_rows,
            headers=["Time", "Temperature", "RelativeHumidity", "Precipitation",
                     "WindSpeed", "WindDirection", "CloudCover", "WeatherDescription"],
            headerTransform=lambda h: {
                "Time": "Time", "Temperature": f"Temp ({units.get('temperature_2m','°C')})",
                "RelativeHumidity": "Humidity (%)", "Precipitation": "Precip (mm)",
                "WindSpeed": "Wind (km/h)", "WindDirection": "Wind Dir (°)",
                "CloudCover": "Cloud Cover (%)", "WeatherDescription": "Conditions",
            }.get(h, h),
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="OpenMeteo.HourlyForecast",
            outputs_key_field="Time",
            outputs=output,
            readable_output=readable,
            raw_response=raw,
        )


    def get_historical_weather_command(client: Client, args: dict) -> CommandResults:
        """
        open-meteo-get-historical-weather
        Returns historical weather data for a date range.
        """
        latitude = args.get("latitude")
        longitude = args.get("longitude")
        location = args.get("location")
        start_date = args.get("start_date")
        end_date = args.get("end_date")
        timezone = args.get("timezone", "auto")

        if not start_date or not end_date:
            raise DemistoException("Both start_date and end_date are required (YYYY-MM-DD).")

        lat, lon, label = resolve_coordinates(client, latitude, longitude, location)

        raw = client.get_historical_weather(lat, lon, start_date, end_date, timezone)
        hourly = raw.get("hourly", {})
        units = raw.get("hourly_units", {})

        times = hourly.get("time", [])
        rows = []
        for i, t in enumerate(times):
            wc = hourly.get("weather_code", [None] * len(times))[i]
            rows.append({
                "Time": t,
                "Temperature": hourly.get("temperature_2m", [None] * len(times))[i],
                "RelativeHumidity": hourly.get("relative_humidity_2m", [None] * len(times))[i],
                "Precipitation": hourly.get("precipitation", [None] * len(times))[i],
                "WindSpeed": hourly.get("wind_speed_10m", [None] * len(times))[i],
                "WindDirection": hourly.get("wind_direction_10m", [None] * len(times))[i],
                "CloudCover": hourly.get("cloud_cover", [None] * len(times))[i],
                "WeatherCode": wc,
                "WeatherDescription": wmo_description(wc),
            })

        output = {
            "Location": label,
            "Latitude": lat,
            "Longitude": lon,
            "Timezone": raw.get("timezone", timezone),
            "StartDate": start_date,
            "EndDate": end_date,
            "Units": units,
            "Hourly": rows,
        }

        readable = tableToMarkdown(
            f"Historical Weather — {label} ({start_date} to {end_date})",
            rows[:48],  # Show first 48 hours in readable output
            headers=["Time", "Temperature", "RelativeHumidity", "Precipitation",
                     "WindSpeed", "CloudCover", "WeatherDescription"],
            headerTransform=lambda h: {
                "Time": "Time",
                "Temperature": f"Temp ({units.get('temperature_2m','°C')})",
                "RelativeHumidity": "Humidity (%)", "Precipitation": "Precip (mm)",
                "WindSpeed": "Wind (km/h)", "CloudCover": "Cloud Cover (%)",
                "WeatherDescription": "Conditions",
            }.get(h, h),
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="OpenMeteo.HistoricalWeather",
            outputs_key_field="Time",
            outputs=output,
            readable_output=readable,
            raw_response=raw,
        )


    def geocode_location_command(client: Client, args: dict) -> CommandResults:
        """
        open-meteo-geocode-location
        Resolve a location name to coordinates.
        """
        location = args.get("location", "")
        if not location:
            raise DemistoException("location argument is required.")

        count = arg_to_number(args.get("count", "5")) or 5
        raw = client.geocode_location(location, count)

        results = raw.get("results", [])
        outputs = [
            {
                "Name": r.get("name"),
                "Country": r.get("country"),
                "CountryCode": r.get("country_code"),
                "Admin1": r.get("admin1"),
                "Latitude": r.get("latitude"),
                "Longitude": r.get("longitude"),
                "Elevation": r.get("elevation"),
                "Timezone": r.get("timezone"),
                "Population": r.get("population"),
            }
            for r in results
        ]

        readable = tableToMarkdown(
            f"Geocoding Results for '{location}'",
            outputs,
            headers=["Name", "Admin1", "Country", "CountryCode", "Latitude", "Longitude", "Timezone"],
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="OpenMeteo.GeocodingResult",
            outputs_key_field="Name",
            outputs=outputs,
            readable_output=readable,
            raw_response=raw,
        )


    """ MAIN """


    def main() -> None:
        params = demisto.params()
        args = demisto.args()
        command = demisto.command()

        verify_certificate = not params.get("insecure", False)
        proxy = params.get("proxy", False)

        demisto.debug(f"Command being called is: {command}")

        try:
            client = Client(
                base_url=BASE_URL,
                verify=verify_certificate,
                proxy=proxy,
            )

            if command == "test-module":
                result = test_module(client)
                return_results(result)

            elif command == "open-meteo-get-current-weather":
                return_results(get_current_weather_command(client, args))

            elif command == "open-meteo-get-hourly-forecast":
                return_results(get_hourly_forecast_command(client, args))

            elif command == "open-meteo-get-historical-weather":
                return_results(get_historical_weather_command(client, args))

            elif command == "open-meteo-geocode-location":
                return_results(geocode_location_command(client, args))

            else:
                raise NotImplementedError(f"Command '{command}' is not implemented.")

        except Exception as e:
            demisto.error(traceback.format_exc())
            return_error(f"Failed to execute {command}. Error: {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()


