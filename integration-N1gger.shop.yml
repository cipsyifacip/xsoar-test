script:
  commands:
  - arguments: []
    name: sampleapi-get-users
  - arguments: []
    name: sampleapi-get-user
  - arguments: []
    name: sampleapi-get-products
  - arguments: []
    name: sampleapi-get-product
  dockerimage: demisto/python3:3.10.12.63474
  isfetch: true
  runonce: false
  script: |2-


    import urllib3

    # Disable insecure warnings
    urllib3.disable_warnings()


    class Client(BaseClient):
        """Client class to interact with the Sample Flask API."""

        def __init__(self, base_url: str, verify: bool, proxy: bool):
            super().__init__(base_url=base_url, verify=verify, proxy=proxy)

        def get_users(self) -> dict:
            return self._http_request(method="GET", url_suffix="/users")

        def get_user_by_id(self, user_id: int) -> dict:
            return self._http_request(method="GET", url_suffix=f"/users/{user_id}")

        def get_products(self, category: str = None) -> dict:
            params = {}
            if category:
                params["category"] = category
            return self._http_request(method="GET", url_suffix="/products", params=params)

        def get_product_by_id(self, product_id: int) -> dict:
            return self._http_request(method="GET", url_suffix=f"/products/{product_id}")

        def test_connection(self) -> dict:
            return self._http_request(method="GET", url_suffix="/")


    # ── Command handlers ──────────────────────────────────────────────────────────

    def test_module(client: Client) -> str:
        """Tests connectivity to the API."""
        client.test_connection()
        return "ok"


    def get_users_command(client: Client, args: dict) -> CommandResults:
        response = client.get_users()
        users = response.get("users", [])

        readable = tableToMarkdown(
            name="Users",
            t=users,
            headers=["id", "name", "email", "age", "role"],
            headerTransform=pascalToSpace,
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="SampleAPI.User",
            outputs_key_field="id",
            outputs=users,
            readable_output=readable,
            raw_response=response,
        )


    def get_user_by_id_command(client: Client, args: dict) -> CommandResults:
        user_id = arg_to_number(args.get("user_id"))
        if user_id is None:
            raise ValueError("user_id is required")

        response = client.get_user_by_id(user_id)

        readable = tableToMarkdown(
            name=f"User {user_id}",
            t=response,
            headers=["id", "name", "email", "age", "role"],
            headerTransform=pascalToSpace,
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="SampleAPI.User",
            outputs_key_field="id",
            outputs=response,
            readable_output=readable,
            raw_response=response,
        )


    def get_products_command(client: Client, args: dict) -> CommandResults:
        category = args.get("category")
        response = client.get_products(category=category)
        products = response.get("products", [])

        title = f"Products (category: {category})" if category else "Products"
        readable = tableToMarkdown(
            name=title,
            t=products,
            headers=["id", "name", "price", "category", "in_stock"],
            headerTransform=pascalToSpace,
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="SampleAPI.Product",
            outputs_key_field="id",
            outputs=products,
            readable_output=readable,
            raw_response=response,
        )


    def get_product_by_id_command(client: Client, args: dict) -> CommandResults:
        product_id = arg_to_number(args.get("product_id"))
        if product_id is None:
            raise ValueError("product_id is required")

        response = client.get_product_by_id(product_id)

        readable = tableToMarkdown(
            name=f"Product {product_id}",
            t=response,
            headers=["id", "name", "price", "category", "in_stock"],
            headerTransform=pascalToSpace,
            removeNull=True,
        )

        return CommandResults(
            outputs_prefix="SampleAPI.Product",
            outputs_key_field="id",
            outputs=response,
            readable_output=readable,
            raw_response=response,
        )


    # ── Entry point ───────────────────────────────────────────────────────────────

    def main():
        params = demisto.params()
        args = demisto.args()
        command = demisto.command()

        base_url = params.get("url", "").rstrip("/")
        verify_certificate = not params.get("insecure", False)
        proxy = params.get("proxy", False)

        demisto.debug(f"Command being called: {command}")

        try:
            client = Client(
                base_url=base_url,
                verify=verify_certificate,
                proxy=proxy,
            )

            if command == "test-module":
                return_results(test_module(client))

            elif command == "sampleapi-get-users":
                return_results(get_users_command(client, args))

            elif command == "sampleapi-get-user":
                return_results(get_user_by_id_command(client, args))

            elif command == "sampleapi-get-products":
                return_results(get_products_command(client, args))

            elif command == "sampleapi-get-product":
                return_results(get_product_by_id_command(client, args))

            else:
                raise NotImplementedError(f"Command '{command}' is not implemented.")

        except Exception as e:
            return_error(f"Failed to execute {command}.\nError: {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
