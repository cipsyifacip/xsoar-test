  ''' STANDALONE FUNCTION '''
  def extract_domain(url):
      # Extract Domain from url.
      # Function yang digunakan untuk breakdown fullpath url diambil hanya domain nya saja.
      # contoh : https://test.co.id/halo/halo menjadi test.co.id.
      try:
          extracted = tldextract.extract(url)
          domain = extracted.domain + "." + extracted.suffix
          return domain
      except:
          return url

  def trim_trailing_slash(url: str) -> str:
      if not url or not isinstance(url, str):
          return url
      return url.strip().rstrip('/')

  def cek_judol(attackurl):
      is_judol = False

      if not attackurl:
          return is_judol

      command = "smc_check_keyword_lists"
      args = {
          'data_to_check': attackurl,
          'list_name': 'JudiOnlineKeywords'
      }

      res = demisto.executeCommand(command, args)
      # print('res', res)

      result_value = None
      if isinstance(res, list) and len(res) > 0:
          if isinstance(res[0], dict) and 'Contents' in res[0]:
              if isinstance(res[0]['Contents'], dict) and 'MatchFound' in res[0]['Contents']:
                  is_judol = res[0]['Contents']['MatchFound']

      return is_judol

  def standardize_social_urls(url, preserve_path=True):
      """
      Standardize social media URLs while preserving path information

      Args:
          url (str): The URL to standardize
          host_info (str, optional): Known host information (e.g., 'Facebook', 'Instagram')
          preserve_path (bool): Whether to preserve the path portion of the URL

      Returns:
          str: Standardized URL
      """
      platform = None

      # Parse the URL to extract components
      try:
          parsed_url = urlparse(url)
          domain = parsed_url.netloc.lower()
          path = parsed_url.path
          query = parsed_url.query

          # If not already determined by host_info, check the domain
          if not platform:
              if any(name in domain for name in ['facebook.com', 'fb.com', 'fb.me']):
                  platform = 'facebook'
              elif any(name in domain for name in ['instagram.com', 'ig.me']):
                  platform = 'instagram'
              elif any(name in domain for name in ['t.me', 'telegram.me', 'telegram.org']):
                  platform = 'telegram'
              elif any(name in domain for name in ['tiktok.com', 'tiktok', 'douyin.com']):
                  platform = 'tiktok'
              elif any(name in domain for name in ['whatsapp.com', 'wa.me']):
                  platform = 'whatsapp'
              elif any(name in domain for name in ['pinterest.', 'pin.it']):
                  platform = 'pinterest'
              elif any(name in domain for name in ['twitter.com', 'x.com', 't.co']):
                  platform = 'x'
              elif any(name in domain for name in ['linkedin.com', 'lnkd.in']):
                  platform = 'linkedin'

          # # Special handling for WhatsApp
          if platform == 'whatsapp':
              # Extract phone number from various WhatsApp URL formats
              phone_number = None

              # Format: wa.me/+1234567890 or wa.me/1234567890
              if domain == 'wa.me' and path and path.strip('/'):
                  phone_number = path.strip('/')

              # Format: api.whatsapp.com/send?phone=1234567890
              elif 'phone=' in query:
                  query_params = dict(parse_qsl(query))
                  phone_number = query_params.get('phone', '')

              if phone_number:
                  # Ensure phone number starts with + if it doesn't already
                  if not phone_number.startswith('+') and not phone_number.startswith('phone='):
                      # Check if it's a numeric string (not already containing 'phone=')
                      if phone_number.replace('+', '').isdigit():
                          phone_number = phone_number

                  # Remove any 'phone=' prefix if it exists
                  phone_number = phone_number.replace('phone=', '')

                  # Return standardized WhatsApp URL
                  return f"https://wa.me/{phone_number}"

          # Standardize based on platform
          if platform:
              # Define standard base URLs for each platform
              base_urls = {
                  'facebook': "https://www.facebook.com",
                  'instagram': "https://www.instagram.com",
                  'telegram': "https://t.me",
                  'tiktok': "https://www.tiktok.com",
                  'whatsapp': "https://wa.me",
                  'pinterest': "https://www.pinterest.com",
                  'x': "https://x.com",
                  'linkedin': "https://www.linkedin.com"
              }

              base_url = base_urls[platform]

              # Build the standardized URL
              if preserve_path:
                  # Add query string if it exists
                  if query:
                      return f"{base_url}{path}?{query}"
                  else:
                      return f"{base_url}{path}"
              else:
                  return base_url
          else:
              # Not a recognized platform, return original URL
              return url

      except Exception as e:
          print(f"Error processing URL {url}: {e}")
          return url

  def add_source(url, incident_type, incident_id, source, type_abuse):
      # Add source to Continental entry
      # incident_type = Source baru (CTM, Netcraft)
      # incident_id = incident id source baru
      # source = (Halo / ISG)
      # type_abuse = (socmed/social media/webapp/webapps)
      reference = requests.utils.unquote(url)
      command = "continental-updatesource-abuse"

      payload = {
          "reference": reference,
          "updated_by": "XSOAR",
          "incident_type": incident_type,
          "incident_id": incident_id,
          "source": source,
          "type": type_abuse,
          "using":"BCA Continental Brand Abuse_instance_SMC"
      }

      res = demisto.executeCommand(command, payload)

      if isError(res):
          demisto.error(f"Failed to add new source for {url}: {get_error(res)}")

      return

  def sql_query(url):
      # To run SQL Query command
      url_for_query = requests.utils.unquote(url)
      domain_query_part = f"`reference` = '{url_for_query}'"
      queries = []

      queries.append(f"SELECT `incident_type` FROM `abuse_socmed_halo` WHERE {domain_query_part}")
      queries.append(f"SELECT `incident_type` FROM `abuse_socmed` WHERE {domain_query_part}")
      queries.append(f"SELECT `incident_type` FROM `abuse_webapps_halo` WHERE {domain_query_part}")
      queries.append(f"SELECT `incident_type` FROM `abuse_webapps` WHERE {domain_query_part}")

      # Check in every table, if found, stop
      for query in queries:
          search_args = {
              'query': query,
              'using': "Generic SQL_pisgdapp"
          }
          res = demisto.executeCommand('sql-command', search_args)

          if isError(res):
              demisto.error(f"Error: {get_error(res)}")
              continue

          if res[0]['Contents']:
              return res[0]['Contents'], query

          # Check if the command executed successfully
          # if isError(res):
          #     demisto.error(f"Error: {get_error(res)}")
          #     continue

      # Extract Contents from the result
      # if res and isinstance(res, list) and len(res) > 0 and 'Contents' in res[0]:
      #     return res[0]['Contents']
      return [], ''

  def check_urls_in_incidents(urls):
      # Check all url in incidents XSOAR.
      # Function yang digunakan untuk melakukan pengecekkan apakah url sudah ada di XSOAR incidents atau belum.
      # urls merupakan kumpulan url (per job) yang nantinya akan dilooping per-batch untuk dicek.
      # Jika belum, akan disimpan url nya sebagai array dengan value False dan lanjut ke step selanjutnya.
      # Jika sudah, maka tidak akan lanjut ke step selanjutnya dengan value True dan berhenti sampai disini.
      results = {}
      if not urls:
          return results

      # Using batching system.
      batch_size = 25

      # Calculate total batches.
      total_urls = len(urls)
      total_batches = (total_urls + batch_size - 1) // batch_size

      demisto.results(f"Starting batch processing for {total_urls} URLs with batch size {batch_size} ({total_batches} batches)")

      # Process in batches.
      for batch_num in range(total_batches):
          start_idx = batch_num * batch_size
          end_idx = min(start_idx + batch_size, total_urls)
          current_batch = urls[start_idx:end_idx]

          demisto.results(f"Processing incidents xsoar check, batch {batch_num+1}/{total_batches} with {len(current_batch)} URLs")

          # Construct query XSOAR conditions for this batch.
          url_conditions = []
          for url in current_batch:
              url_conditions.append(f'(attackurl:"{url}" OR otherurl:"{url}")')

          # Join conditions with OR.
          url_query_part = " OR ".join(url_conditions)

          # Construct the complete query.
          query = f'type:BCA_Brand_Abuse AND ({url_query_part})'

          # Execute SearchIncidentsV2 command.
          search_args = {
              'query': query,
              'size': len(current_batch) * 2,  # In case some URLs appear in multiple incidents
              'sort': 'created',
              'orderBy': 'desc',
              'fromdate': '1 year ago'
          }

          try:
              res = demisto.executeCommand('SearchIncidentsV2', search_args)

              if isError(res):
                  demisto.error(f"Error in batch {batch_num+1}: {get_error(res)}")
                  # Initialize all URLs in this batch as not found (false).
                  for url in current_batch:
                      results[url] = False
                  continue

              # Extract incidents from result.
              incidents = res[0]['Contents'][0]['Contents']['data']
              demisto.results(f"Found {len(incidents)} incidents matching the query in batch {batch_num+1}")

              # Initialize all URLs in this batch as not found (false).
              for url in current_batch:
                  results[url] = False

              # Check if URLs are found in the returned incidents.
              for incident in incidents:
                  custom_fields = incident.get('CustomFields', {})
                  attack_url = custom_fields.get('attackurl', '')
                  other_urls = custom_fields.get('otherurl', '')

                  # Check attack_url field.
                  if attack_url and attack_url in current_batch:
                      results[attack_url] = True

                  # Check otherurl field (could be a list or string depending on field configuration).
                  if isinstance(other_urls, str):
                      # If it's a string, check if any URL in the batch is contained in it.
                      for url in current_batch:
                          if url in other_urls:
                              results[url] = True
                  elif isinstance(other_urls, list):
                      # If it's a list, check each item.
                      for url in current_batch:
                          if url in other_urls:
                              results[url] = True

          except Exception as e:
              demisto.error(f"Exception in batch {batch_num+1}: {str(e)}")
              # Initialize any unprocessed URLs in this batch as not found.
              for url in current_batch:
                  if url not in results:
                      results[url] = False

      # Verify all URLs have been processed.
      for url in urls:
          if url not in results:
              demisto.results(f"URL {url} was not processed in any batch, marking as not found")
              results[url] = False

      demisto.results(f"Finished processing {len(results)} URLs. Found {sum(results.values())} matches in incidents")
      return results

  def check_urls_in_third_party(urls, time):
      # Function yang digunakan untuk melakukan pengecekkan apakah url sudah ada di list url third party (Netcraft) atau belum.
      # urls merupakan kumpulan url (per job) yang nantinya akan dilooping per-batch untuk dicek.
      # time merupakan variable untuk menampung tanggal yang akan digunakan sebagai date_to.
      # Jika belum, akan disimpan url nya sebagai array dengan value False dan lanjut ke step selanjutnya.
      # Jika sudah, maka tidak akan lanjut ke step selanjutnya dengan value True dan berhenti sampai disini.
      """
      Check if URLs exist in third-party platform one by one.
      The third-party API returns URLs in a wildcard manner.

      Args:
          urls (list): List of URLs to check

      Returns:
          dict: Dictionary with URLs as keys and boolean values indicating existence
      """
      results = {}
      if not urls:
          return results

      total_urls = len(urls)
      demisto.results(f"Starting third-party check for {total_urls} URLs (one by one)")

      # Process URLs one by one.
      batchnum = 1
      for index, url in enumerate(urls):
          # logging every 25 data
          if index % 25 == 0:
              demisto.results(f"Processing third-party check every 25 data with total urls to check {total_urls}, batch {batchnum}")
              batchnum += 1

          try:
              # Call the third-party check command for a single URL.
              res = demisto.executeCommand("netcraft-takedown-list",{"url": url,"date_to":time,"date_from":"2020-01-01 00:00:00","using":"Netcraft V2_instance_SMC"})

              if isError(res):
                  demisto.error(f"Error checking URL {url} in third-party platform: {get_error(res)}")
                  results[url] = False
                  continue

              # Process result from third-party check.
              # Assuming the command returns a list of URLs that match via wildcard.
              result_content = [entry["attack_url"] for item in res for entry in item.get("Contents", []) if "attack_url" in entry]
              matched_urls = []

              # Check the structure of result_content and extract matched URLs.
              if isinstance(result_content, dict) and 'attack_url' in result_content:
                  # If result contains a list of matched URLs.
                  if isinstance(result_content['attack_url'], list):
                      matched_urls = result_content['attack_url']
                  elif isinstance(result_content['attack_url'], str):
                      matched_urls = [result_content['attack_url']]
              elif isinstance(result_content, list):
                  # If result is directly a list of matched URLs.
                  matched_urls = result_content

              # Check if the exact URL exists in the matched URLs list.
              exact_match_exists = url in matched_urls

              # If there are wildcard matches but no exact match.
              # we still consider it as not existing in third-party.
              results[url] = exact_match_exists

              if matched_urls and not exact_match_exists:
                  demisto.results(f"URL {url} has wildcard matches in third-party but no exact match. Considering as not found.")
              elif matched_urls:
                  demisto.results(f"URL {url} has an exact match in third-party.")
              else:
                  demisto.results(f"URL {url} has no matches in third-party.")

          except Exception as e:
              demisto.error(f"Exception checking URL {url} in third-party platform: {str(e)}")
              results[url] = False

      demisto.results(f"Finished checking {total_urls} URLs in third-party platform. Found {sum(results.values())} exact matches")
      return results

  def create_incident_for_domain_group(domain, urls_data):
      # Function yang digunakan untuk create alert/ticket di XSOAR.
      # domain merupakan variable yang menyimpan domain yang akan dibuatkan alert/ticket.
      # urls_data merupakan variable yang menyimpan seluruh data yang berasal dari CTI/HALO yang akan disimpan sebagai context data di alert/ticket XSOAR.
      # encodedimage merupakan variable yang akan menyimpan base64 data khusus untuk HALO yang berasal dari conti.
