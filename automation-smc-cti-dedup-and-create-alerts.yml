  def convert_date_for_continental(date_string: str, add_utc_timezone: bool = False, dayfirst: bool = False, fuzzy: bool = True, yearfirst: bool = True) -> Optional[str]:
      # Function yang digunakan untuk convert tanggal agar sesuai dengan format continental.
      """
      Convert a date string to ISO 8601 format.

      Args:
          date_string (str): The date string to convert.
          add_utc_timezone (bool): Whether to add UTC timezone.
          dayfirst (bool): Whether to interpret the first value as the day.
          fuzzy (bool): Whether to allow fuzzy parsing.
          yearfirst (bool): Whether to interpret the first value as the year.

      Returns:
          str: The date string in ISO format or None if parsing fails.
      """
      if not date_string:
          return None

      # Configure settings for dateparser
      settings = {
          'DATE_ORDER': 'YMD' if yearfirst else ('DMY' if dayfirst else 'MDY'),
          'FUZZY': fuzzy
      }

      if add_utc_timezone:
          settings['TIMEZONE'] = 'UTC'

      # Parse the date
      parsed_date = dateparser.parse(date_string, settings=settings)

      if not parsed_date:
          return None

      # Format in ISO 8601
      if add_utc_timezone:
          return parsed_date.isoformat()  # Includes timezone
      else:
          return parsed_date.strftime('%Y-%m-%dT%H:%M:%S')  # No timezone

  def extract_inbetween(text, start_str, end_str):
      # Function yang dibuat menyerupai transformer xsoar yang digunakan untuk separate/cut text berdasarkan keyword start string dan end string.
      """Extract text between two strings"""
      if not text or not start_str or not end_str:
          return text

      start_pos = text.find(start_str)
      if start_pos == -1:
          return text

      start_pos += len(start_str)
      end_pos = text.find(end_str, start_pos)
      if end_pos == -1:
          return text

      return text[start_pos:end_pos]

