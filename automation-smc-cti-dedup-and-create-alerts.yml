  def determine_alertcategory(incident):
      # Convert to lowercase for case-insensitive comparison
      # Function yang digunakan untuk menentukan alert category untuk mengetahui.
      # Apakah url yang sedang di cek merupakah Phishing Web, Social Media, Mobile App atau Others.
      # Berdasarkan social media keyword / tipe alert dari CTI.
      attack_type_lower = incident.lower()

      # Check for Social Media condition
      social_media_keywords = [
          'instagram', 'facebook', 'youtube', 'tiktok', 'weibo', 'whatsapp',
          'pinterest', 'twitter', 'linkedin', 'olx', 'vimeo', 'telegram',
          'email', 'dailymotion', 'fake_shop', 'skype'
      ]

      social_media_exact_matches = [
          'auto generated page', 'brand impersonation', 'executive impersonation',
          'fake ad', 'other_social_media_infringement', 'reported_fraud_phone',
          'soundcloud_brand_infringement'
      ]

      # Check for Social Media
      is_social_media = False

      # Check for keyword containment
      for keyword in social_media_keywords:
          if keyword in attack_type_lower:
              is_social_media = True
              break

      # Check for exact matches
      if not is_social_media:
          for exact_match in social_media_exact_matches:
              if attack_type_lower == exact_match:
                  is_social_media = True
                  break

      # Check exclusions for Social Media
      if is_social_media:
          if 'phishkit' in attack_type_lower or attack_type_lower == 'exposed email address':
              is_social_media = False

      # Check for Website Phishing
      website_phishing_contains = ['phishing']

      website_phishing_equals = [
          'brand_infringement', 'brand abuse', 'cyber evil twin site',
          'domain infringement', 'phish redirector', 'malware',
          'cryptocurrency_investment_scam', 'dropsite', 'fake_bank_url',
          'malware_c2', 'malware_c2_distribution', 'other_url',
          'phishing_url', 'phishkit_archive', 'sends_malware_attachments',
          'sends_phishing_url', 'targeted_attack', 'malicious redirector'
      ]

      is_website_phishing = False

      # Check for keyword containment
      for keyword in website_phishing_contains:
          if keyword in attack_type_lower:
              is_website_phishing = True
              break

      # Check for exact matches
      if not is_website_phishing:
          for exact_match in website_phishing_equals:
              if attack_type_lower == exact_match:
                  is_website_phishing = True
                  break

      # Check for Aplikasi Ilegal
      aplikasi_ilegal_equals = [
          'fake_mobile_app', 'suspicious mobile app', 'android_malware_distribution'
      ]

      is_aplikasi_ilegal = False

      # Check for exact matches
      for exact_match in aplikasi_ilegal_equals:
          if attack_type_lower == exact_match:
              is_aplikasi_ilegal = True
              break

      # Determine the result
      if is_social_media:
          return "Social Media"
      elif is_website_phishing:
          return "Phishing Web"
      elif is_aplikasi_ilegal:
          return "Mobile App"
      else:
          return "Others"

