              if isError(res):
                  demisto.error(f"Error creating incident for domain {domain}: {get_error(res)}")
                  return None

              incident_id = res[0]['Contents']['response']['id']
              return incident_id
          else:
              return

      except Exception as e:
          demisto.error(f"Exception creating incident for domain {domain}: {str(e)}\n{traceback.format_exc()}")
          return None

