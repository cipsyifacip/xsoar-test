name: IncidentFilterOriginal
pswd: ""
runas: DBotWeakRole
runonce: false
script: |-
  from datetime import datetime
  import re

  def parse_latest_timestamp(handover_comment) :
      # Find all timestamps matching [DD Mon YYYY, HH:MM]
      pattern = r'\[(\d{2} \w+ \d{4}, \d{2}:\d{2})\]'
      matches = re.findall(pattern, handover_comment)

      if not matches:
          return None

      timestamps = [datetime.strptime(ts, "%d %b %Y, %H:%M") for ts in matches]
      latest = max(timestamps)
      return latest

  def main():
      # Search for incidents
      search_results = demisto.executeCommand("SearchIncidentsV2", {
          #"query": "tags: SMC and status:Active and smcneedaction:no", #time range belum ada
          "query": "tags:SMC and status:Active and smcneedaction:no and created:>\"6 months ago\""
      })

      incidents = search_results[0].get('Contents',[{}])[0].get('Contents', {}).get('data', [])
      # DEBUG - print all caught incident IDs
      caught_ids = [incident.get('id') for incident in incidents] if incidents else []
      demisto.results({
          'Type': 1,
          'Contents': f"Query caught {len(caught_ids)} incidents. IDs: {caught_ids if caught_ids else 'None'}",
          'ContentsFormat': 'text'
      })

      if not incidents:
          demisto.results({
          'Type': 1,
          'Contents': 'No eligible incidents found.',
          'ContentsFormat': 'text'
          })
          return

      today = datetime.now()
      flipped = []
      total_processed = len(incidents)

      for incident in incidents:
          incident_id = incident.get('id')
          handover_comment = incident.get('CustomFields', {}).get('handovercomment', '')

          if not handover_comment:
              continue

          latest_ts = parse_latest_timestamp(handover_comment)

          if not latest_ts:
              continue

          delta = (today - latest_ts).days
          if delta >= 5:
              demisto.executeCommand("setIncident", {
                  "id": incident_id,
                  "smcneedaction": "yes"
              })
              flipped.append(incident_id)

      demisto.setContext('StaleIncidents.FlippedIDs', flipped)
      demisto.setContext('StaleIncidents.TotalProcessed', total_processed)
      demisto.setContext('StaleIncidents.TotalFlipped', len(flipped))

      demisto.results({
      'Type': 1,
      'Contents': f"Processed: {total_processed} incidents. Flipped: {len(flipped)}. IDs: {flipped if flipped else 'None'}",
      'ContentsFormat': 'text'

      })

  main()
