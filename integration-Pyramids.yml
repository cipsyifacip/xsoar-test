display: Pyramids
image: data:image/png;base64,
name: Pyramids
script:
  commands:
  - arguments:
    - name: rows
      required: true
    name: pyramid-create
  - arguments:
    - name: rows
      required: true
    name: pyramid-create-reverse
  - arguments:
    - name: rows
      required: true
    name: pyramid-create-diamond
  dockerimage: demisto/python3:3.12.8.3296088
  runonce: false
  script: |-
    # ──────────────────────────────────────────────
    # Helper Functions
    # ──────────────────────────────────────────────

    def build_pyramid(rows: int, char: str = "*") -> str:
        lines = []
        for i in range(1, rows + 1):
            spaces = " " * (rows - i)
            stars = char * (2 * i - 1)
            lines.append(spaces + stars)
        return "\n".join(lines)


    def build_reverse_pyramid(rows: int, char: str = "*") -> str:
        lines = []
        for i in range(rows, 0, -1):
            spaces = " " * (rows - i)
            stars = char * (2 * i - 1)
            lines.append(spaces + stars)
        return "\n".join(lines)


    def build_diamond(rows: int, char: str = "*") -> str:
        top = build_pyramid(rows, char)
        bottom = build_reverse_pyramid(rows - 1, char)
        return top + "\n" + bottom if bottom else top


    # ──────────────────────────────────────────────
    # Command Functions
    # ──────────────────────────────────────────────

    def pyramid_command():
        args = demisto.args()
        rows = int(args.get("rows", 0))
        char = args.get("char", "*")

        if rows <= 0:
            return_error("'rows' must be a positive integer greater than 0.")

        result = build_pyramid(rows, char)
        return CommandResults(
            readable_output=f"**Pyramid ({rows} rows):**\n```\n{result}\n```",
            outputs_prefix="Pyramid.Normal",
            outputs={"rows": rows, "char": char, "shape": result}
        )


    def reverse_pyramid_command():
        args = demisto.args()
        rows = int(args.get("rows", 0))
        char = args.get("char", "*")

        if rows <= 0:
            return_error("'rows' must be a positive integer greater than 0.")

        result = build_reverse_pyramid(rows, char)
        return CommandResults(
            readable_output=f"**Reverse Pyramid ({rows} rows):**\n```\n{result}\n```",
            outputs_prefix="Pyramid.Reverse",
            outputs={"rows": rows, "char": char, "shape": result}
        )


    def diamond_command():
        args = demisto.args()
        rows = int(args.get("rows", 0))
        char = args.get("char", "*")

        if rows <= 0:
            return_error("'rows' must be a positive integer greater than 0.")

        result = build_diamond(rows, char)
        return CommandResults(
            readable_output=f"**Diamond ({rows} rows):**\n```\n{result}\n```",
            outputs_prefix="Pyramid.Diamond",
            outputs={"rows": rows, "char": char, "shape": result}
        )


    # ──────────────────────────────────────────────
    # Main Entry Point
    # ──────────────────────────────────────────────

    def main():
        command = demisto.command()

        try:
            if command == "test-module":
                demisto.results("ok")

            elif command == "pyramid-create":
                return_results(pyramid_command())

            elif command == "pyramid-create-reverse":
                return_results(reverse_pyramid_command())

            elif command == "pyramid-create-diamond":
                return_results(diamond_command())

            else:
                return_error(f"Unknown command: {command}")

        except ValueError:
            return_error("Invalid input: 'rows' must be a valid integer.")
        except Exception as e:
            return_error(f"An error occurred: {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
