description: Custom integration Zoho Desk untuk PT Dinamika Sistem Integrasi Solusi.
  Menghitung kuota pemakaian tiket per kontrak (workaround license Professional),
  plus utilitas search/list modul repurposed (Tasks=Project Contract, Events=Devices).
display: Zoho Desk (Custom - Dinamika)
image: data:image/png;base64,
name: ZohoDesk
script:
  commands:
  - arguments:
    - defaultValue: tickets
      description: 'Modul: tickets / tasks / events / accounts / contacts.'
      name: module
    description: List semua field sebuah modul (untuk discover apiName custom fields
      cf_*).
    name: zohodesk-org-fields
    outputs:
    - contextPath: ZohoDesk.OrgField
      description: Daftar field modul.
  - arguments:
    - defaultValue: "50"
      description: Jumlah record.
      name: limit
    - defaultValue: "0"
      description: Offset pagination.
      name: from
    description: List Project Contract (modul Tasks).
    name: zohodesk-list-contracts
    outputs:
    - contextPath: ZohoDesk.Contract
      description: Record kontrak.
  - arguments:
    - defaultValue: "50"
      description: Jumlah record.
      name: limit
    - defaultValue: "0"
      description: Offset pagination.
      name: from
    description: List Devices (modul Events).
    name: zohodesk-list-devices
    outputs:
    - contextPath: ZohoDesk.Device
      description: Record device.
  - arguments:
    - description: Nilai No PKS/PO (difilter via custom field tiket).
      name: contract_number
    - description: 'Filter custom field bebas, format: cf_apiname:value.'
      name: custom_field
    - description: Open / On Hold / Closed.
      name: status
    - description: ID account (CustomerDB).
      name: accountId
    - description: 'Format: startISO,endISO (mis. 2026-01-01T00:00:00.000Z,2026-12-31T23:59:59.999Z).'
      name: createdTimeRange
    - description: Sama seperti createdTimeRange, untuk modified time.
      name: modifiedTimeRange
    - description: Mis. -createdTime.
      name: sortBy
    - defaultValue: "50"
      description: Jumlah hasil.
      name: limit
    description: Search tiket dengan filter kontrak/status/waktu/custom field.
    name: zohodesk-search-tickets
    outputs:
    - contextPath: ZohoDesk.Ticket
      description: Tiket hasil search.
  - arguments:
    - description: Opsional — hitung satu kontrak saja; kosongkan untuk semua kontrak.
      name: contract_number
    - description: Override kategori yang dihitung (comma-separated, persis nilai
        picklist).
      name: categories
    - description: 'Override kuota per plan, format: Platinum:25,Gold:20,...'
      name: plan_quota_map
    description: Hitung pemakaian kuota tiket per kontrak (used=Closed, in-flight=Open/On
      Hold; kategori Incident/Activity Support/RMA).
    name: zohodesk-get-quota-usage
    outputs:
    - contextPath: ZohoDesk.Quota.ContractNumber
      description: Nomor kontrak (No PKS/PO/SPK/LO).
    - contextPath: ZohoDesk.Quota.TotalTicket
      description: Kuota total kontrak.
    - contextPath: ZohoDesk.Quota.Used
      description: Tiket terpakai (Closed).
    - contextPath: ZohoDesk.Quota.InFlight
      description: Tiket Open/On Hold (belum makan kuota).
    - contextPath: ZohoDesk.Quota.Remaining
      description: Sisa kuota.
    - contextPath: ZohoDesk.Quota.PercentUsed
      description: Persentase terpakai.
    - contextPath: ZohoDesk.Quota.IsUnlimited
      description: Kontrak unlimited atau tidak.
  - arguments:
    - description: ID tiket (bukan ticketNumber).
      name: ticket_id
      required: true
    - description: Isi komentar.
      name: content
      required: true
    - defaultValue: "false"
      description: true untuk komentar publik.
      name: is_public
    description: Tambah komentar (default private/internal note) ke tiket.
    name: zohodesk-add-comment
  - arguments:
    - description: ID tiket.
      name: ticket_id
      required: true
    - description: 'JSON field yang di-update, mis. {"status": "On Hold"} atau {"cf":
        {"cf_x": "y"}}.'
      name: fields_json
      required: true
    description: Update field tiket (PATCH).
    name: zohodesk-update-ticket
    outputs:
    - contextPath: ZohoDesk.Ticket
      description: Tiket setelah update.
  dockerimage: docker.io/demisto/python3:3.12.13.10404775
  runonce: false
  script: |
    import json
    import time
    import urllib3
    urllib3.disable_warnings()

    MAX_PAGES = 40          # pengaman pagination (40 x 100 = 4000 tiket per kontrak)
    PAGE_SIZE = 100


    class Client(BaseClient):
        def __init__(self, params: dict):
            super().__init__(
                base_url=params['desk_url'].rstrip('/'),
                verify=not params.get('insecure', False),
                proxy=params.get('proxy', False))
            self.accounts_url = params['accounts_url'].rstrip('/')
            self.client_id = params['client_id']
            self.client_secret = params.get('client_secret', {}).get('password') \
                if isinstance(params.get('client_secret'), dict) else params.get('client_secret')
            self.refresh_token = params.get('refresh_token', {}).get('password') \
                if isinstance(params.get('refresh_token'), dict) else params.get('refresh_token')
            self.org_id = params.get('org_id')

        def get_access_token(self) -> str:
            ctx = get_integration_context() or {}
            now = int(time.time())
            if ctx.get('access_token') and ctx.get('expires_at', 0) > now + 60:
                return ctx['access_token']
            resp = self._http_request(
                'POST', url_suffix='', full_url=f'{self.accounts_url}/oauth/v2/token',
                params={'grant_type': 'refresh_token', 'client_id': self.client_id,
                        'client_secret': self.client_secret, 'refresh_token': self.refresh_token})
            token = resp.get('access_token')
            if not token:
                raise DemistoException(f'Gagal refresh access token: {resp}')
            set_integration_context({'access_token': token,
                                     'expires_at': now + int(resp.get('expires_in', 3600))})
            return token

        def api(self, method: str, url_suffix: str, params: dict = None, json_data: dict = None):
            headers = {'Authorization': f'Zoho-oauthtoken {self.get_access_token()}'}
            if self.org_id:
                headers['orgId'] = str(self.org_id)
            resp = self._http_request(method, url_suffix, params=params, json_data=json_data,
                                      headers=headers, ok_codes=(200, 201, 204),
                                      resp_type='response')
            # Zoho Desk balas HTTP 204 tanpa body kalau hasil list kosong
            if resp.status_code == 204 or not resp.content:
                return {}
            return resp.json()

        def paginate(self, url_suffix: str, params: dict = None) -> list:
            params = dict(params or {})
            params['limit'] = params.get('limit', PAGE_SIZE)
            params['from'] = 0
            out = []
            for _ in range(MAX_PAGES):
                page = self.api('GET', url_suffix, params=params).get('data', [])
                out.extend(page)
                if len(page) < params['limit']:
                    break
                params['from'] += params['limit']
            return out


    def build_search_params(client: Client, args: dict, params: dict) -> dict:
        sp = {}
        cf_idx = 1
        if args.get('contract_number'):
            sp[f'customField{cf_idx}'] = f"{params['cf_ticket_contract']}:{args['contract_number']}"
            cf_idx += 1
        if args.get('custom_field'):  # format bebas "cf_apiname:value"
            sp[f'customField{cf_idx}'] = args['custom_field']
        for key in ('status', 'accountId', 'createdTimeRange', 'modifiedTimeRange', 'sortBy'):
            if args.get(key):
                sp[key] = args[key]
        return sp


    def cmd_test(client: Client) -> str:
        client.api('GET', '/tickets', params={'limit': 1})
        return 'ok'


    def cmd_org_fields(client: Client, args: dict) -> CommandResults:
        module = args.get('module', 'tickets')
        data = client.api('GET', '/organizationFields', params={'module': module}).get('data', [])
        rows = [{'apiName': f.get('apiName'), 'label': f.get('displayLabel'),
                 'type': f.get('type'), 'isCustom': f.get('isCustomField')} for f in data]
        return CommandResults(
            outputs_prefix='ZohoDesk.OrgField', outputs=rows,
            readable_output=tableToMarkdown(f'Fields modul {module}', rows))


    def cmd_list(client: Client, args: dict, endpoint: str, title: str, prefix: str) -> CommandResults:
        params = {'limit': min(int(args.get('limit', 50)), PAGE_SIZE),
                  'from': int(args.get('from', 0))}
        data = client.api('GET', endpoint, params=params).get('data', [])
        return CommandResults(
            outputs_prefix=prefix, outputs_key_field='id', outputs=data,
            readable_output=tableToMarkdown(title, data, removeNull=True))


    def cmd_search_tickets(client: Client, args: dict, params: dict) -> CommandResults:
        sp = build_search_params(client, args, params)
        sp['limit'] = min(int(args.get('limit', 50)), PAGE_SIZE)
        resp = client.api('GET', '/tickets/search', params=sp)
        data = resp.get('data', [])
        headers = ['ticketNumber', 'subject', 'status', 'createdTime', 'closedTime']
        return CommandResults(
            outputs_prefix='ZohoDesk.Ticket', outputs_key_field='id', outputs=data,
            readable_output=tableToMarkdown(
                f"Hasil search ({resp.get('count', len(data))} match)", data,
                headers=headers, removeNull=True))


    def count_tickets(client: Client, params: dict, contract_number: str,
                      statuses: list, categories: list) -> int:
        """Hitung tiket per kontrak. Filter kategori server-side via customField2,
        karena list/search response tidak selalu menyertakan cf."""
        total = 0
        for status in statuses:
            for cat in (categories or [None]):
                sp = {'customField1': f"{params['cf_ticket_contract']}:{contract_number}",
                      'status': status, 'limit': PAGE_SIZE, 'from': 0}
                if cat:
                    sp['customField2'] = f"{params['cf_ticket_category']}:{cat}"
                for _ in range(MAX_PAGES):
                    page = client.api('GET', '/tickets/search', params=sp).get('data', [])
                    total += len(page)
                    if len(page) < PAGE_SIZE:
                        break
                    sp['from'] += PAGE_SIZE
        return total


    def parse_plan_map(raw: str) -> dict:
        """'Combo:6,Gold:unlimited' -> {'combo': 6, 'gold': 'unlimited'} (case-insensitive).
        Nilai bisa angka atau string 'unlimited'."""
        out = {}
        for pair in argToList(raw):
            if ':' in pair:
                k, v = pair.rsplit(':', 1)
                v = v.strip()
                if v.isdigit():
                    out[k.strip().lower()] = int(v)
                elif v.lower() == 'unlimited':
                    out[k.strip().lower()] = 'unlimited'
        return out


    def cmd_quota_usage(client: Client, args: dict, params: dict) -> CommandResults:
        categories = argToList(args.get('categories') or params.get('counted_categories')
                               or 'Incident,Activity Support,Return Merchandise Authorization (RMA)')
        plan_map = parse_plan_map(args.get('plan_quota_map')
                                  or params.get('plan_quota_map')
                                  or 'Combo:6,Bronze:12,Silver:24,Gold:unlimited')
        contracts = client.paginate('/tasks')
        wanted = args.get('contract_number')
        results = []
        for c in contracts:
            cf = c.get('cf') or c.get('customFields') or {}
            if not cf:
                # list /tasks tidak menyertakan cf — ambil detail per record
                detail = client.api('GET', f"/tasks/{c['id']}")
                if detail:
                    c = detail
                    cf = c.get('cf') or c.get('customFields') or {}

            def cfv(api_name):
                return cf.get(api_name) or cf.get(api_name.removeprefix('cf_')) or c.get(api_name)

            number = cfv('cf_no_pks_po_spk_lo') or c.get('subject')
            if wanted and str(number) != str(wanted):
                continue
            def truthy(v):
                return str(v).lower() in ('true', '1', 'yes')

            # resolusi kuota: Custom Credit (Credit Limit manual, override) > default plan type.
            # Plan tertentu (mis. Gold) di-map ke 'unlimited'.
            plan = (cfv(params['cf_task_plan_type']) or '').strip()
            unlimited = False
            if truthy(cfv(params['cf_task_custom_credit'])):
                total_quota = arg_to_number(cfv(params['cf_task_credit_limit'])) or 0
                quota_source = 'Custom Credit'
            else:
                mapped = plan_map.get(plan.lower())
                if mapped == 'unlimited':
                    unlimited = True
                    total_quota = 0
                    quota_source = f'Plan {plan} (unlimited)'
                elif mapped is not None:
                    total_quota = mapped
                    quota_source = f'Plan {plan}'
                else:
                    total_quota = 0
                    quota_source = f'Plan {plan} (tak dikenal!)' if plan else 'Plan tidak diisi!'
            used = count_tickets(client, params, str(number), ['Closed'], categories)
            in_flight = count_tickets(client, params, str(number),
                                      ['Open', 'On Hold', 'Escalated', 'In Progress'], categories)
            remaining = None if unlimited else max(total_quota - used, 0)
            pct = None if unlimited or not total_quota else round(used * 100.0 / total_quota, 1)
            results.append({
                'ContractNumber': number, 'Subject': c.get('subject'),
                'PlanType': plan or None, 'QuotaSource': quota_source,
                'IsUnlimited': unlimited, 'TotalTicket': total_quota,
                'Used': used, 'InFlight': in_flight,
                'Remaining': remaining, 'PercentUsed': pct,
                'TaskId': c.get('id'), 'Status': c.get('status'),
            })
        return CommandResults(
            outputs_prefix='ZohoDesk.Quota', outputs_key_field='ContractNumber',
            outputs=results,
            readable_output=tableToMarkdown('Pemakaian kuota per kontrak', results,
                                            removeNull=True))


    def cmd_add_comment(client: Client, args: dict) -> CommandResults:
        body = {'content': args['content'],
                'isPublic': argToBoolean(args.get('is_public', 'false'))}
        resp = client.api('POST', f"/tickets/{args['ticket_id']}/comments", json_data=body)
        return CommandResults(readable_output=f"Komentar ditambahkan ke tiket {args['ticket_id']}.",
                              outputs_prefix='ZohoDesk.Comment', outputs=resp)


    def cmd_update_ticket(client: Client, args: dict) -> CommandResults:
        fields = json.loads(args['fields_json'])
        resp = client.api('PATCH', f"/tickets/{args['ticket_id']}", json_data=fields)
        return CommandResults(readable_output=f"Tiket {args['ticket_id']} di-update.",
                              outputs_prefix='ZohoDesk.Ticket', outputs_key_field='id',
                              outputs=resp)


    def main():
        params = demisto.params()
        args = demisto.args()
        command = demisto.command()
        client = Client(params)
        try:
            if command == 'test-module':
                return_results(cmd_test(client))
            elif command == 'zohodesk-org-fields':
                return_results(cmd_org_fields(client, args))
            elif command == 'zohodesk-list-contracts':
                return_results(cmd_list(client, args, '/tasks',
                                        'Project Contracts (Tasks)', 'ZohoDesk.Contract'))
            elif command == 'zohodesk-list-devices':
                return_results(cmd_list(client, args, '/events',
                                        'Devices (Events)', 'ZohoDesk.Device'))
            elif command == 'zohodesk-search-tickets':
                return_results(cmd_search_tickets(client, args, params))
            elif command == 'zohodesk-get-quota-usage':
                return_results(cmd_quota_usage(client, args, params))
            elif command == 'zohodesk-add-comment':
                return_results(cmd_add_comment(client, args))
            elif command == 'zohodesk-update-ticket':
                return_results(cmd_update_ticket(client, args))
            else:
                raise NotImplementedError(f'Command {command} belum diimplementasikan')
        except Exception as e:
            return_error(f'Error di ZohoDesk integration: {e}')


    if __name__ in ('__main__', '__builtin__', 'builtins'):
        main()
  subtype: python3
  type: python
