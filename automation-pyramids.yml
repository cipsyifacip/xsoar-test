name: pyramids
pswd: ""
runas: DBotWeakRole
runonce: false
script: |-
  args = demisto.args()

  def build_pyramid(rows):
      lines = []
      for i in range(1, rows + 1):
          spaces = " " * (rows - i)
          stars = "*" * (2 * i - 1)
          lines.append(spaces + stars)
      return "\n".join(lines)

  try:
      rows = int(args.get("rows", 0))
      if rows <= 0:
          demisto.results("Error: 'rows' must be a positive integer greater than 0.")
      else:
          pyramid = build_pyramid(rows)
          demisto.results(pyramid)
  except ValueError:
      demisto.results("Error: 'rows' must be a valid integer.")
