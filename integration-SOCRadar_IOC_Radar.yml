  dockerimage: demisto/python3:3.12.8.3296088
  runonce: false
  script: |
    register_module_line('SOCRadar IOC Radar', 'start', __line__())
    CONSTANT_PACK_VERSION = '1.0.0'
    demisto.debug('pack id = SOCRadar IOC Radar, pack version = 1.0.0')

    #tes
    #tes 2
    import urllib.request
    import traceback
    from typing import Any

    BRAND_NAME = "SOCRadar IOC Radar"  # matches context output path for faster caching

    RE_VERDICT = r'class="(critical|high|medium|low)\s+subtitle"'
    RE_NOT_FOUND = r'<p class="title"[^>]*>(.*?)</p>'
    RE_PERCENTAGE = r'<span class="percentage"[^>]*>(.*?)</span>'
    RE_SIGNAL = r'<span class="value text-bold"[^>]*>(.*?)</span>'
    RE_COUNTRY = r'<div class="country-item"[^>]*><span[^>]*>(.*?)</span></div>'
    RE_AS = r'<div class="as-info"[^>]*>(.*?)</div>'

    class Client():
        def __init__(self, base_url: str, reliability: str):
            self.base_url = base_url
            self.reliability = reliability
            self.headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                'Accept': 'application/json, text/plain, */*',
                'Accept-Language': 'en-US,en;q=0.9',
                'Referer': self.base_url,
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }

        def get_rep(self, ip: str) -> dict[str, Any]:
            return self.http_request(ip)

        def http_request(self, ip: str) -> dict[str, Any]:
            url_suffix = f'/labs/app/ioc-radar/{ip}'
            req = urllib.request.Request(self.base_url+url_suffix, headers=self.headers)
            with urllib.request.urlopen(req) as response:
                response_decode = response.read().decode('utf-8')
            return response_decode


    def test_module(client: Client) -> str:
        """Tests SOCRadar by sending a query on 8.8.8.8"""
        client.get_rep("8.8.8.8")
        return "ok"  # on any failure, an exception is raised

    def dbot_scoring_ip(ip, verdict, risk_score, as_owner, country, signal_str, reliability, unknown):
        score = None
        """Dbot Scoring for indicator extraction"""
        if isinstance(verdict, str):
            if verdict == 'critical':
                score = Common.DBotScore.BAD
            elif verdict == 'high':
                score = Common.DBotScore.BAD
            elif verdict == 'medium':
                score = Common.DBotScore.SUSPICIOUS
        if not score:
            if unknown:
                score = Common.DBotScore.NONE # Result with N/A result
            else:
                score = Common.DBotScore.GOOD  # Result with class low

        entry_context = {
            'IPAddress': ip,
            'ASOwner': as_owner,
            'RiskPercentage': risk_score,
            'SignalStrength': signal_str,
            'Verdict': verdict,
            'Geo': {'Country': country},
        }
        outputs_key_field = 'Address'

        dbot_score = Common.DBotScore(
            indicator=ip,
            indicator_type=DBotScoreType.IP,
            reliability=reliability,
            integration_name=BRAND_NAME,
            score=score,
        )

        indicator = Common.IP(
            ip=ip,
            dbot_score=dbot_score,
            geo_country=country,
        )

        results = CommandResults(
            raw_response={
                'IPAddress' : ip,
                'SignalStrength': signal_str,
                'RiskPercentage': risk_score,
                'Verdict': verdict,
                'ASOwner' : as_owner,
                'Country' : country,
            },
            outputs_prefix='SOCRadarIOCRadar.IP',
            outputs=entry_context,
            outputs_key_field=outputs_key_field,
            indicator=indicator,
        )

        return results

    def dbot_scoring_domain(domain, verdict, risk_score, as_owner, country, signal_str, reliability, unknown):
        score = None
        if isinstance(verdict, str):
            if verdict == 'critical':
                score = Common.DBotScore.BAD
            elif verdict == 'high':
                score = Common.DBotScore.BAD
            elif verdict == 'medium':
                score = Common.DBotScore.SUSPICIOUS

        if not score:
            if unknown:
                score = Common.DBotScore.NONE # Result with N/A result
            else:
                score = Common.DBotScore.GOOD  # Result with class low

        entry_context = {
            'DomainAddress': domain,
            'ASOwner': as_owner,
            'RiskPercentage': risk_score,
            'SignalStrength': signal_str,
            'Verdict': verdict,
            'Geo': {'Country': country},
        }
        outputs_key_field = 'Address'

        dbot_score = Common.DBotScore(
            indicator=domain,
            indicator_type=DBotScoreType.DOMAIN,
            reliability=reliability,
            integration_name=BRAND_NAME,
            score=score,
        )

        indicator = Common.Domain(
            domain=domain,
            dbot_score=dbot_score,
            geo_country=country,
        )

        results = CommandResults(
            raw_response={
                'Domain' : domain,
                'SignalStrength': signal_str,
                'RiskPercentage': risk_score,
                'Verdict': verdict,
                'ASOwner' : as_owner,
                'Country' : country,
            },
            outputs_prefix='SOCRadarIOCRadar.Domain',
            outputs=entry_context,
            outputs_key_field=outputs_key_field,
            indicator=indicator,
        )

        return results

    def parse_results(ioc: str, raw_result: dict[str, Any], reliability: str, cat: str) -> List[CommandResults]:
        unknown = False
        match_not_found = None
        match_signal_str = None
        match_percent = None
        match_country = None
        match_as = None
        match_verdict = None

        match_not_found = re.search(RE_NOT_FOUND, raw_result)

        if match_not_found :
            raw_result = raw_result
            unknown = True

        match_signal_str  = re.search(RE_SIGNAL, raw_result)
        if match_signal_str:
            match_signal_str = match_signal_str.group(1)


        try:
            match_percent = re.search(RE_PERCENTAGE, raw_result).group(1).rstrip('%')
            risk_percent = float(match_percent)
        except:
            demisto.info('Result is N/A or Undefined')
            if match_percent:
                risk_percent = match_percent
            else:
                risk_percent = None
            unknown = True

        match_country = re.search(RE_COUNTRY, raw_result)
        if match_country:
            match_country = match_country.group(1)

        match_as = re.search(RE_AS, raw_result)
        if match_as:
            match_as = match_as.group(1)

        match_verdict = re.search(RE_VERDICT, raw_result)
        if match_verdict:
            match_verdict = match_verdict.group(1).lower()

        match cat:
            case 'ip':
                return dbot_scoring_ip(ioc, match_verdict, risk_percent, match_as, match_country, match_signal_str, reliability, unknown)
            case 'domain':
                return dbot_scoring_domain(ioc, match_verdict, risk_percent, match_as, match_country, match_signal_str, reliability, unknown)


    def getrep_ip_command(client: Client, ip: str, cat: str) -> List[List[CommandResults]]:
        ip_lists = argToList(ip)
        ip_results = []

        for ip in ip_lists:
            response = client.get_rep(ip)
            ip_results.append(parse_results(ip, response, client.reliability, cat))

        return ip_results

    def getrep_domain_command(client: Client, domain: str, cat: str) -> List[List[CommandResults]]:
        domain_lists = argToList(domain)
        domain_results = []

        for domain in domain_lists:
            response = client.get_rep(domain)
            domain_results.append(parse_results(domain, response, client.reliability, cat))

        return domain_results

    def main() -> None:
        """main function, parses params and runs command functions"""

        params = demisto.params()
        args = demisto.args()
        command = demisto.command()

        proxy = params.get("proxy") or False
        insecure = params.get("insecure") or False
        base_url = params.get("base_url") or "https://socradar.io"
        reliability = params.get("integrationReliability")

        demisto.debug(f"Command being called is {command}")

        try:
            client = Client(base_url=base_url, reliability=reliability)

            if command == "test-module":
                return_results(test_module(client))

            elif command == "ip":
                args['cat'] = 'ip'
                ip_command = getrep_ip_command(client, **args)
                return_results(ip_command)

            elif command == "domain":
                args['cat'] = 'domain'
                domain_command = getrep_domain_command(client, **args)
                return_results(domain_command)
            else:
                raise NotImplementedError(f"command {command} is not supported")

        # Log exceptions and return errors
        except Exception as e:
            demisto.error(traceback.format_exc())  # print the traceback
            return_error(f"Failed to execute {command} command.\nError:\n{e!s}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()

    register_module_line('SOCRadar IOC Radar', 'end', __line__())
  subtype: python3
  type: python
