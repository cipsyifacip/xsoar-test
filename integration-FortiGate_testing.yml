      type: String
    - contextPath: Fortigate.Address.SubType
      description: 'Sub-type of address. Can be: `sdn`, `clearpass-spt`, `fsso`, `ems-tag`,
        `fortivoice-tag`, `fortinac-tag`, `fortipolicy-tag` or `swc-tag`.'
      type: String
    - contextPath: Fortigate.Address.UUID
      description: Universally Unique Identifier.
      type: String
    - contextPath: Fortigate.Address.ObjectTag
      description: Tag of dynamic address object.
      type: String
    - contextPath: Fortigate.Address.VDOM
      description: Virtual domains (VDOMs) enable you to partition and use your FortiGate
        unit as if it were multiple units.
      type: String
  - arguments:
    - defaultValue: root
      description: Virtual domains (VDOMs) enable you to partition and use your FortiGate
        unit as if it were multiple units. Use `*` to retrieve all virtual domains.
        VDOMs can be retrieved with the command `fortigate-list-system-vdoms`.
      name: vdom
