        ) -> dict[str, Any]:
            """Create a policy.

            Args:
                name (str): Name of the policy to create
                vdom (str | None, optional): The VDOM to use.
                    Defaults to DEFAULT_VDOM.
                comment (str | None, optional): A comment for the service.
                    Defaults to None.

