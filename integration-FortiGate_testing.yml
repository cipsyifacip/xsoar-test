    - description: Final IP address (inclusive) in the range for the address.
      name: end_ip
    - description: 'IP addresses associated to a specific country. Input must be according
        to the two-letter counter codes, for example: `IL`.'
      name: country
    - description: 'Comma-separated list of MAC addresses. Can be single or range.
        Range must be separated by `-`, for examlpe: `00:00:00:00:00:00` or `00:00:00:00:00:00-FF:FF:FF:FF:FF:FF`.'
