script: |
  import re

  def main():
      entry_id = demisto.args().get("entry_id")
      log_text = demisto.args().get("log_text", "")

      if entry_id:
          file = demisto.getFilePath(entry_id)
          if file:
              with open(file['path'], 'r') as f:
                  log_text = f.read()

      if not log_text:
          return_results({"LogAnalysis": {
              "score": 0,
              "summary": "No log text provided",
              "found_keywords": [],
              "ips_found": [],
              "usernames_found": []
          }})
          return

      keywords = {
          "failed password": 3,
          "authentication failure": 3,
          "res=failed": 2,
          "bruteforce": 5,
          "sudo": 2,
          "unauthorized": 4,
          "privilege escalation": 5,
          "shadow": 5,
          "passwd": 4,
          "curl": 2,
          "download": 2,
          "payload": 4,
          "credential": 5,
          "dump-creds": 5
      }

      lower = log_text.lower()
      found_keywords = []
      score = 0

      for kw, weight in keywords.items():
          if kw in lower:
              found_keywords.append({"keyword": kw, "weight": weight})
              score += weight

      ips = re.findall(r"\b(?:\d{1,3}\.){3}\d{1,3}\b", log_text)

      usernames = set()
      m1 = re.findall(r"Failed password for ([A-Za-z0-9_-]+)", log_text, re.IGNORECASE)
      m2 = re.findall(r"user[= ]([A-Za-z0-9_-]+)", log_text, re.IGNORECASE)
      m3 = re.findall(r"sudo: ([A-Za-z0-9_-]+)", log_text, re.IGNORECASE)

      for m in m1 + m2 + m3:
          usernames.add(m)

      usernames = list(usernames)

      summary = f"Score={score} | Keywords={len(found_keywords)} | IPs={len(ips)} | Users={len(usernames)}"

      return_results({"LogAnalysis": {
          "score": score,
          "found_keywords": found_keywords,
          "ips_found": ips,
          "usernames_found": usernames,
          "summary": summary
      }})

  if __name__ in ("__main__", "__builtin__", "builtins"):
      main()
