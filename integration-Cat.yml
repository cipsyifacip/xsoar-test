name: Cat
script:
  commands:
  - arguments: []
    name: cataas-get-cat
  - arguments:
    - name: tag
      required: true
    name: cataas-get-cat-by-tag
  - arguments: []
    name: cataas-get-cat-gif
  - arguments:
    - name: text
      required: true
    name: cataas-cat-says
  - arguments:
    - name: tag
      required: true
    name: cataas-cat-tag-says
  dockerimage: demisto/python3:3.12.8.3296088
  runonce: false
  script: |-
    BASE_URL = "https://cataas.com"


    # ──────────────────────────────────────────────
    # HTTP Client
    # ──────────────────────────────────────────────

    def build_url(path: str, params: dict) -> str:
        """Build a full URL with query parameters."""
        clean_params = {k: v for k, v in params.items() if v}
        query = "&".join(f"{k}={v}" for k, v in clean_params.items())
        return f"{BASE_URL}{path}?{query}" if query else f"{BASE_URL}{path}"


    def fetch_cat(path: str, params: dict = {}):
        """Fetch a cat from the API and return as a file result."""
        url = build_url(path, params)
        response = requests.get(url, timeout=10)

        if response.status_code != 200:
            return_error(f"Failed to fetch cat. Status: {response.status_code}, URL: {url}")

        content_type = response.headers.get("Content-Type", "image/jpeg")

        # If JSON was requested
        if "json" in content_type or params.get("json") == "true":
            return CommandResults(
                readable_output="### Cat (JSON)",
                outputs_prefix="CATAAS.Cat",
                outputs=response.json()
            )

        # Return as image file
        ext = "gif" if "gif" in content_type else "jpg"
        return fileResult(f"cat.{ext}", response.content, file_type=entryTypes["image"])


    # ──────────────────────────────────────────────
    # Command Functions
    # ──────────────────────────────────────────────

    def cat_random_command():
        """GET /cat — Returns a random cat."""
        args = demisto.args()
        params = {
            "type":   args.get("type"),
            "filter": args.get("filter"),
            "width":  args.get("width"),
            "height": args.get("height"),
            "json":   args.get("json"),
            "html":   args.get("html"),
            # custom filter params
            "brightness": args.get("brightness"),
            "lightness":  args.get("lightness"),
            "saturation": args.get("saturation"),
            "hue":        args.get("hue"),
            "r": args.get("r"),
            "g": args.get("g"),
            "b": args.get("b"),
        }
        return fetch_cat("/cat", params)


    def cat_by_tag_command():
        """GET /cat/:tag — Returns a random cat with a tag."""
        args = demisto.args()
        tag = args.get("tag", "")
        params = {
            "type":   args.get("type"),
            "filter": args.get("filter"),
            "width":  args.get("width"),
            "height": args.get("height"),
        }
        return fetch_cat(f"/cat/{tag}", params)


    def cat_gif_command():
        """GET /cat/gif — Returns a random gif cat."""
        args = demisto.args()
        params = {
            "type":   args.get("type"),
            "filter": args.get("filter"),
            "width":  args.get("width"),
            "height": args.get("height"),
        }
        return fetch_cat("/cat/gif", params)


    def cat_says_command():
        """GET /cat/says/:text — Returns a random cat saying text."""
        args = demisto.args()
        text = args.get("text", "")
        params = {
            "fontSize":  args.get("font_size"),
            "fontColor": args.get("font_color"),
            "type":      args.get("type"),
            "filter":    args.get("filter"),
            "width":     args.get("width"),
            "height":    args.get("height"),
        }
        return fetch_cat(f"/cat/says/{text}", params)


    def cat_tag_says_command():
        """GET /cat/:tag/says/:text — Returns a cat with a tag and saying text."""
        args = demisto.args()
        tag  = args.get("tag", "")
        text = args.get("text", "")
        params = {
            "fontSize":  args.get("font_size"),
            "fontColor": args.get("font_color"),
            "type":      args.get("type"),
            "filter":    args.get("filter"),
        }
        return fetch_cat(f"/cat/{tag}/says/{text}", params)


    # ──────────────────────────────────────────────
    # Main Entry Point
    # ──────────────────────────────────────────────

    def main():
        command = demisto.command()

        try:
            if command == "test-module":
                requests.get(f"{BASE_URL}/cat?json=true", timeout=10)
                demisto.results("ok")

            elif command == "cataas-get-cat":
                return_results(cat_random_command())

            elif command == "cataas-get-cat-by-tag":
                return_results(cat_by_tag_command())

            elif command == "cataas-get-cat-gif":
                return_results(cat_gif_command())

            elif command == "cataas-cat-says":
                return_results(cat_says_command())

            elif command == "cataas-cat-tag-says":
                return_results(cat_tag_says_command())

            else:
                return_error(f"Unknown command: {command}")

        except Exception as e:
            return_error(f"An error occurred: {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
