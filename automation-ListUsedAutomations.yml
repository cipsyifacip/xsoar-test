script: |-
  import json

  def list_unique_automations_csv():
      # Use a set for guaranteed uniqueness
      used_scripts = set()

      # 1. Search for all active playbooks
      body = {
          "query": "hidden:F",
          "page": 0,
          "size": 1000  # Increase if you have >1000 playbooks
      }

      res = demisto.executeCommand(
          "core-api-post",
          {
              "uri": "/playbook/search",
              "body": json.dumps(body)
          }
      )

      if isError(res[0]):
          return_error("Error fetching playbooks: " + str(res[0]))

      # Handle API response structure
      api_response = res[0].get('Contents', {}).get('response', {})
      if not api_response:
          api_response = res[0].get('Contents', {})

      playbooks = api_response.get('playbooks', [])

      if not playbooks:
          return_results("No playbooks found.")
          return

      # 2. Iterate and Extract
      for pb in playbooks:
          tasks = pb.get('tasks', {})

          for task_id, task_data in tasks.items():
              task_inner = task_data.get('task', {})

              # Use 'scriptId' as discovered in diagnostics
              raw_name = task_inner.get('scriptId')

              if raw_name:
                  # Clean the name: Remove whitespace and ensure it's a string
                  clean_name = str(raw_name).strip()

                  # Filter out Builtin commands and empty strings
                  if clean_name and 'Builtin|||' not in clean_name:
                      used_scripts.add(clean_name)

      # 3. Generate CSV Output
      if used_scripts:
          # Sort the unique list
          sorted_list = sorted(list(used_scripts))

          # Create CSV content
          csv_content = "Automation Name\n"
          for script in sorted_list:
              csv_content += f"{script}\n"

          # Return as a downloadable file
          return_results(fileResult("unique_used_automations.csv", csv_content))

          # Also show a summary note
          return_results({
              'ContentsFormat': formats['markdown'],
              'Type': entryTypes['note'],
              'Contents': f"### Success\nGenerated a clean list of **{len(sorted_list)}** unique automations.\nCheck the 'File' tab or download the attachment."
          })
      else:
          return_results("No automations found.")

  if __name__ in ("__main__", "__builtin__", "builtins"):
      list_unique_automations_csv()
