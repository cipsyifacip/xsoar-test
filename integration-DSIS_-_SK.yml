  dockerimage: demisto/python3:3.12.8.3296088
  isfetch: true
  runonce: false
  script: |-
    import requests
    import json

    def get_data(base_url):
        url = base_url.strip('/') + "/fetch-data"

        session = requests.Session()
        session.trust_env = False

        res = session.get(url, verify=False, timeout=10)
        res.raise_for_status()

        data = res.json()

        inner_data = data.get('sample', {})
        if isinstance(inner_data, dict) and 'sample' in inner_data:
            inner_data = inner_data.get('sample')

        flattened_results = []

        if isinstance(inner_data, dict):
            for key, value in inner_data.items():
                if isinstance(value, list) and len(value) > 0:
                    item = value[0]
                    item['source_index'] = key
                    flattened_results.append(item)
                elif isinstance(value, dict):
                    flattened_results.append(value)

        return flattened_results

    def fetch_incidents_command(base_url):
        data_items = get_data(base_url)
        incidents = []

        for item in data_items:
            raw_date = item.get('date_submitted')


            dt = arg_to_datetime(raw_date)

            if dt:
                occurred_format = dt.strftime('%Y-%m-%dT%H:%M:%SZ')
            else:
                occurred_format = datetime.now().strftime('%Y-%m-%dT%H:%M:%SZ')

            incident = {
                #'name': f"Brand Abuse from DSIS - SK: {item.get('attack_url', 'Unknown')}",
                'name': f"Brand Abuse from DSIS - KS:",
                'occurred': occurred_format,
                'rawJSON': json.dumps(item)
            }
            incidents.append(incident)

        demisto.incidents(incidents)

    def main():
        # Use demisto.command() and demisto.params()
        command = demisto.command()
        params = demisto.params()
        base_url = params.get("URL")

        try:
            if command == "test-module":
                get_data(base_url)
                return_results("ok")

            elif command == "getData":
                data = get_data(base_url)
                return_results(CommandResults(
                    outputs_prefix='MyIntegration.Data',
                    outputs=data,
                    readable_output=tableToMarkdown('Fetched Data', data)
                ))

            elif command == "fetch-incidents":
                fetch_incidents_command(base_url)

        except Exception as e:
            return_error(f"Failed to execute {command}. Error: {str(e)}")

    if __name__ in ('__main__', '__builtin__', 'builtins'):
        main()
  subtype: python3
  type: python
