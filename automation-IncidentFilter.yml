name: IncidentFilter
pswd: ""
runas: DBotWeakRole
runonce: false
script: |-
  from datetime import datetime
  import re

  def parse_latest_timestamp(handover_comment):
      pattern = r'\[(\d{2} \w{3} \d{4}, \d{2}:\d{2})\]'
      matches = re.findall(pattern, handover_comment)
      if not matches:
          return None
      timestamps = [
          datetime.strptime(ts, "%d %b %Y, %H:%M")
          for ts in matches
      ]
      return max(timestamps)

  def main():
      search_results = demisto.executeCommand(
          "SearchIncidentsV2",
          {
              "query": 'tags:SMC and status:Active and smcneedaction:no and created:>"6 months ago"'
          }
      )

      contents = search_results[0].get('Contents', [])
      if isinstance(contents, dict):
          incidents = contents.get('data', [])
      elif isinstance(contents, list):
          incidents = contents[0].get('Contents', {}).get('data', [])
      else:
          incidents = []

      caught_ids = [incident.get('id') for incident in incidents]
      demisto.results({
          'Type': 1,
          'Contents': f"Query caught {len(caught_ids)} incidents. IDs: {caught_ids if caught_ids else 'None'}",
          'ContentsFormat': 'text'
      })

      # DEBUG 1 - inspect raw contents structure
      demisto.results({
          'Type': 1,
          'Contents': f"Raw contents type: {type(contents).__name__}, value: {str(contents)[:500]}",
          'ContentsFormat': 'text'
      })

      # DEBUG 2 - inspect each incident's CustomFields keys
      for incident in incidents:
          demisto.results({
              'Type': 1,
              'Contents': f"ID: {incident.get('id')} | CustomFields keys: {list(incident.get('CustomFields', {}).keys())}",
              'ContentsFormat': 'text'
          })

      if not incidents:
          demisto.results({
              'Type': 1,
              'Contents': 'No eligible incidents found.',
              'ContentsFormat': 'text'
          })
          return

      today = datetime.now()
      flipped = []
      total_processed = len(incidents)

      for incident in incidents:
          incident_id = incident.get('id')
          handover_comment = (
              incident.get('CustomFields', {})
              .get('handovercomment', '')
          )
          if not handover_comment:
              continue
          latest_ts = parse_latest_timestamp(handover_comment)
          if not latest_ts:
              continue
          delta_minutes = (today - latest_ts).total_seconds() / 60
          if delta_minutes >= 5:
              demisto.executeCommand(
                  "setIncident",
                  {
                      "id": incident_id,
                      "smcneedaction": "yes"
                  }
              )
              flipped.append(incident_id)

      demisto.setContext('StaleIncidents.FlippedIDs', flipped)
      demisto.setContext('StaleIncidents.TotalProcessed', total_processed)
      demisto.setContext('StaleIncidents.TotalFlipped', len(flipped))
      demisto.results({
          'Type': 1,
          'Contents': (
              f"Processed: {total_processed} incidents. "
              f"Flipped: {len(flipped)}. "
              f"IDs: {flipped if flipped else 'None'}"
          ),
          'ContentsFormat': 'text'
      })

  main()
