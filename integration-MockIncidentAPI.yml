description: Fetch incidents from custom mock incident API
display: Mock Incident API
image: data:image/jpeg;base64,
name: MockIncidentAPI
script:
  dockerimage: docker.io/demisto/python3:3.12.13.8428455
  feed: true
  isFetchSamples: true
  isfetch: true
  runonce: false
  script: |2-



    DEFAULT_FETCH_LIMIT = 100


    class Client(BaseClient):

        def get_incidents(self, limit):
            return self._http_request(
                method='GET',
                url_suffix=f'/incidents?limit={limit}'
            )


    def test_module(client):
        response = client.get_incidents(1)

        if response.get("success") is True:
            return "ok"

        return "Failed to connect to API"


    def fetch_incidents(client, last_run, max_fetch):
        demisto.debug("Running fetch-incidents")

        incidents = []

        response = client.get_incidents(max_fetch)

        data = response.get("incidents", [])

        last_incident_id = last_run.get("last_incident_id", 0)

        max_id = last_incident_id

        for item in data:

            incident_id = item.get("id")

            if incident_id <= last_incident_id:
                continue

            occurred = item.get("occurred")

            incident = {
                "name": item.get("name", f"Incident {incident_id}"),
                "occurred": occurred,
                "rawJSON": json.dumps(item),
                "type": item.get("type", "Unclassified"),
                "severity": map_severity(item.get("severity"))
            }

            incidents.append(incident)

            if incident_id > max_id:
                max_id = incident_id

        next_run = {
            "last_incident_id": max_id
        }

        return next_run, incidents


    def map_severity(severity):
        mapping = {
            "Low": 1,
            "Medium": 2,
            "High": 3,
            "Critical": 4
        }

        return mapping.get(severity, 0)


    def main():
        params = demisto.params()

        url = params.get("url")
        verify = not params.get("insecure", False)
        proxy = params.get("proxy", False)

        max_fetch = int(params.get("max_fetch", DEFAULT_FETCH_LIMIT))

        headers = {
            "Accept": "application/json"
        }

        client = Client(
            base_url=url,
            verify=verify,
            proxy=proxy,
            headers=headers
        )

        command = demisto.command()

        demisto.debug(f"Command being called is {command}")

        try:

            if command == "test-module":
                result = test_module(client)
                return_results(result)

            elif command == "fetch-incidents":

                next_run, incidents = fetch_incidents(
                    client=client,
                    last_run=demisto.getLastRun(),
                    max_fetch=max_fetch
                )

                demisto.setLastRun(next_run)

                demisto.incidents(incidents)

        except Exception as e:
            err = traceback.format_exc()
            demisto.error(err)
            return_error(f"Failed to execute command. Error: {str(e)}")


    if __name__ in ("__main__", "__builtin__", "builtins"):
        main()
  subtype: python3
  type: python
